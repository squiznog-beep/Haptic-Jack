<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>TRI▲GE v0.16.3 FIX</title>

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: monospace;
  overflow: hidden;
}

/* ---------------- BOOT ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: white;
  z-index: 9999;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  cursor: pointer;
  transition: opacity 0.6s ease;
}

#title {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  letter-spacing: 12px;
  transform: translateX(calc(1% + 4px));

  color: #b938948;
  font-size: 40px;
}

.triangle {
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-bottom: 24px solid #c00000;
}

#bootVer { margin-top: 10px; font-size: 13px; }

.field {
  width: 260px;
  border-bottom: 1px solid #ddd;
  padding: 6px;
  margin-top: 14px;
  min-height: 18px;
}

#bootText {
  margin-top: 28px;
  color: #4a90ff;
  opacity: 0;
  animation: pulse 5s ease-in-out infinite;
}

@keyframes pulse {
  0% { opacity: 0; }
  25% { opacity: 0.85; }
  55% { opacity: 0.85; }
  100% { opacity: 0; }
}

/* ---------------- PLAYER ---------------- */

#wrapper {
  height: 100vh;
  display: none;
  justify-content: center;
  align-items: center;
}

#panel {
  width: 520px;
  text-align: center;
}

/* ---------------- PLAYLIST ---------------- */

#playlist {
  height: 180px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
  font-size: 16px;
}

.track {
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s ease;
  cursor: pointer;
}

.track.active {
  color: #c00000;
  font-weight: bold;
  transform: scale(1.25);
}

.track.near { opacity: 0.55; }
.track.far { opacity: 0.2; transform: scale(0.88); }

/* ---------------- SINGLE PLAY TRIANGLE ---------------- */

#playAlign {
  position: fixed;
  left: calc(50% - 260px - 90px);
  top: 0;
  width: 0;
  height: 0;

  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-bottom: 30px solid #c00000;

  transform-origin: center;
  cursor: pointer;
}

#playAlign.spinning {
  animation: spin 3.8s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ---------------- PROGRESS ---------------- */

#progressContainer {
  width: 100%;
  height: 6px;
  background: #eee;
  cursor: pointer;
}

#progressBar {
  width: 0%;
  height: 100%;
  background: #c00000;
}

/* ---------------- VOLUME ---------------- */

#volumeWrap {
  margin-top: 18px;
}

input[type=range] {
  width: 220px;
  accent-color: #c00000;
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.6;
}

</style>
</head>

<body>

<div id="boot">
  <div id="title">
    <span>T</span><span>R</span><span>I</span>
    <div class="triangle"></div>
    <span>G</span><span>E</span>
  </div>

  <div id="bootVer">v0.16.3</div>
  <div class="field" id="userField"></div>
  <div class="field" id="passField"></div>
  <div id="bootText">Wake up -U</div>
</div>

<div id="wrapper">

  <!-- SINGLE CONTROL TRIANGLE -->
  <div id="playAlign"></div>

  <div id="panel">
    <div id="playlist"></div>

    <div id="progressContainer">
      <div id="progressBar"></div>
    </div>

    <div id="volumeWrap">
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
    </div>
  </div>
</div>

<div id="version">Current Build: 0.16.3 FIX</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

<script>

const tracks = [
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3", volume: 0.1 },
  { title: "Announcement 1", file: "Announcement1.oga", volume: 0.6 },
  { title: "Control Yourself", file: "Edith Margaret Mudge - Triangle Agency - 01 Control Yourself.flac", volume: 0.05 },
  { title: "Stability", file: "Stability.mp3", volume: 0.05 },
  { title: "Announcement 2", file: "Announcement2.oga", volume: 0.6 },
];

let currentTrack = 0;
let sound;
let globalVolume = 1;

const playlist = document.getElementById("playlist");
const playAlign = document.getElementById("playAlign");

function updatePlayPosition() {
  const baseHeight = 34;
  const centerIndex = 2;
  const offset = (currentTrack - centerIndex) * baseHeight;

  playAlign.style.top = `calc(50% + ${offset}px - 15px)`;
}

function playTrack(i) {
  currentTrack = i;

  if (sound) sound.unload();

  sound = new Howl({
    src: [tracks[i].file],
    html5: true,
    volume: tracks[i].volume * globalVolume
  });

  sound.play();
  render();
  updatePlayPosition();
}

function render() {
  playlist.innerHTML = "";

  tracks.forEach((t, i) => {
    const div = document.createElement("div");
    div.className = "track" + (i === currentTrack ? " active" : "");
    div.textContent = t.title;
    div.onclick = () => playTrack(i);
    playlist.appendChild(div);
  });
}

playAlign.onclick = () => {
  if (!sound) return;
  sound.playing() ? sound.pause() : sound.play();
};

document.getElementById("volumeSlider").oninput = (e) => {
  globalVolume = parseFloat(e.target.value);
  if (sound) sound.volume(tracks[currentTrack].volume * globalVolume);
};

render();
playTrack(0);

</script>

</body>
</html>
