<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Audio Player</title>
</head>

<body style="background:#111;color:white;font-family:sans-serif;padding:20px;">

<h3>Audio Player</h3>

<audio id="audio" controls></audio>

<br><br>

<label>Volume</label>
<input id="vol" type="range" min="0" max="100" step="1" value="10">

<p id="status">Ready</p>

<script>

const audio = document.getElementById("audio");
const vol = document.getElementById("vol");
const status = document.getElementById("status");

const tracks = [
  "Notes5.oga",
  "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3"
];

let currentTrack = 0;

/* ---------------- VOLUME ---------------- */

function setVolume(percent){
  audio.volume = percent / 100;
  vol.value = percent;
}

vol.addEventListener("input", e => {
  setVolume(e.target.value);
});

/* ---------------- LOAD ---------------- */

function loadTrack(index){
  currentTrack = index;
  audio.src = tracks[index];
}

/* ---------------- SAFE PLAY ---------------- */

function safePlay(volumePercent){

  audio.muted = true;

  audio.play().then(() => {

    // Let playback stabilize first
    setTimeout(() => {
      audio.muted = false;
      setVolume(volumePercent);
    }, 150);

  }).catch(() => {
    status.innerText = "Autoplay blocked";
  });

}

/* ---------------- AUTO NEXT ---------------- */

audio.addEventListener("ended", () => {

  if(currentTrack === 0){
    loadTrack(1);
    safePlay(10);
  } else {
    status.innerText = "Playback finished";
  }

});

/* ---------------- AUTOPLAY INTRO ---------------- */

window.addEventListener("load", () => {

  loadTrack(0);
  safePlay(70);

});

/* ---------------- INIT ---------------- */

setVolume(10);

</script>

</body>
</html>
