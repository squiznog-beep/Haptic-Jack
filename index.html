<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>TRI▲GE v0.15</title>

<style>

/* ---------------- BASE (EXPERIMENTAL STYLE) ---------------- */

body {
  margin: 0;
  background: white;
  font-family: monospace;
  color: black;
  overflow: hidden;
}

/* ---------------- BOOT ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 9999;
  transition: opacity 0.6s ease;
}

#title {
  font-size: 44px;
  letter-spacing: 6px;
  color: #c00000;
  display: flex;
  align-items: center;
  gap: 8px;
}

.triangle {
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-bottom: 24px solid #c00000;
}

#bootVer {
  margin-top: 10px;
  font-size: 13px;
  color: black;
}

.field {
  width: 260px;
  border-bottom: 1px solid #ddd;
  padding: 6px;
  margin-top: 12px;
  min-height: 18px;
}

#bootText {
  margin-top: 25px;
  opacity: 0;
  transition: opacity 0.4s ease;
  color: black;
}

/* ---------------- PLAYER LAYOUT FIX ---------------- */

.wrapper {
  display: none;
  height: 100vh;

  /* THIS is what fixed your “slid left” issue */
  display: flex;
  justify-content: center;
  align-items: center;
}

/* centered panel */
.panel {
  width: 420px;
  padding: 20px;

  background: white;
  border: 1px solid #eee;
}

/* ---------------- PLAYLIST ---------------- */

#playlist {
  text-align: center;
}

.track {
  padding: 6px;
  cursor: pointer;
  color: black;
  transition: 0.2s ease;
}

.track.active {
  color: #c00000;
  font-weight: bold;
  transform: scale(1.25);
}

.track.near {
  opacity: 0.6;
}

.track.far {
  opacity: 0.2;
  transform: scale(0.9);
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.6;
  color: black;
}

</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  <div id="title">
    T R I <div class="triangle"></div> G E
  </div>

  <div id="bootVer">v0.15</div>

  <div class="field" id="userField"></div>
  <div class="field" id="passField"></div>

  <div id="bootText">CLICK TO INITIALIZE</div>
</div>

<!-- PLAYER -->
<div class="wrapper" id="wrapper">
  <div class="panel">
    <div id="playlist"></div>
  </div>
</div>

<div id="version">
Last Functional Build: N/A<br>
Current Build: 0.15
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

<script>

/* ---------------- TRACKS ---------------- */

const tracks = [
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3", volume: 0.1 },
  { title: "Announcement 1", file: "Announcement1.oga", volume: 0.6 },
  { title: "Control Yourself", file: "Edith Margaret Mudge - Triangle Agency - 01 Control Yourself.flac", volume: 0.05 },
  { title: "Stability", file: "Edith Margaret Mudge - Stability - Expansion Pack - 01 Stability - Loopable Extension.mp3", volume: 0.05 },
  { title: "Announcement 2", file: "Announcement2.oga", volume: 0.6 }
];

let currentTrack = 0;
let sound = null;

/* ---------------- ELEMENTS ---------------- */

const boot = document.getElementById("boot");
const bootText = document.getElementById("bootText");
const u = document.getElementById("userField");
const p = document.getElementById("passField");
const wrapper = document.getElementById("wrapper");

/* ---------------- TYPE EFFECTS ---------------- */

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

async function typeUser(text) {
  for (let i = 0; i <= text.length; i++) {
    u.innerText = text.slice(0, i);
    await sleep(40);
  }
}

/* FIXED: per-character asterisk replacement */
async function typePassword(text) {
  let visible = "";

  for (let i = 0; i < text.length; i++) {
    visible += text[i];

    let masked = "";
    for (let j = 0; j < visible.length; j++) masked += "*";

    p.innerText = masked;

    await sleep(90);
  }
}

/* ---------------- HOWLER ---------------- */

function playTrack(i) {

  currentTrack = i;

  if (sound) sound.unload();

  sound = new Howl({
    src: [tracks[i].file],
    volume: tracks[i].volume ?? 1,
    html5: true
  });

  sound.play();
}

/* ---------------- SLIDING 5-TRACK WINDOW ---------------- */

function render() {
  const el = document.getElementById("playlist");
  el.innerHTML = "";

  tracks.forEach((t, i) => {

    const dist = i - currentTrack;
    if (Math.abs(dist) > 2) return;

    const div = document.createElement("div");
    div.className = "track";

    if (dist === 0) div.classList.add("active");
    else if (Math.abs(dist) === 1) div.classList.add("near");
    else div.classList.add("far");

    div.innerText = t.title;
    div.onclick = () => playTrack(i);

    el.appendChild(div);
  });
}

/* ---------------- BOOT ---------------- */

async function bootSequence() {

  bootText.style.opacity = 1;

  await sleep(400);
  await typeUser("SusanSurandin");

  await sleep(200);
  await typePassword("WitnessMe");

  await sleep(500);

  bootText.innerText = "INITIALIZING AUDIO SUBSYSTEM";
  await sleep(800);

  bootText.innerText = "WELCOME BACK SUSAN";
  await sleep(700);

  boot.style.opacity = 0;
  await sleep(600);

  boot.style.display = "none";
  wrapper.style.display = "flex";

  render();
  playTrack(0);
}

window.addEventListener("click", bootSequence, { once: true });

</script>

</body>
</html>
