<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>TRI▲GE v0.15.6</title>

<style>

body {
  margin: 0;
  background: white;
  font-family: monospace;
  overflow: hidden;
  color: black;
}

/* ---------------- BOOT ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: white;
  z-index: 9999;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  cursor: pointer;
}

/* HEADER FIX */
#title {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;

  transform: translateX(6px);
  letter-spacing: 6px;

  font-size: 40px;
  color: #c00000;
}

.triangle {
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-bottom: 24px solid #c00000;

  margin-left: 10px;
  margin-right: 18px;
}

#bootVer {
  margin-top: 10px;
  font-size: 13px;
}

.field {
  width: 260px;
  border-bottom: 1px solid #ddd;
  margin-top: 14px;
  padding: 6px;
}

/* WAKE TEXT */
#bootText {
  margin-top: 28px;
  color: #4a90ff;
  animation: pulse 5s ease-in-out infinite;
}

@keyframes pulse {
  0% { opacity: 0; }
  25% { opacity: 0.8; }
  55% { opacity: 0.8; }
  100% { opacity: 0; }
}

/* ---------------- PLAYER ---------------- */

#wrapper {
  display: none;
  height: 100vh;
  align-items: center;
  justify-content: center;
}

#panel {
  width: 520px;
  text-align: center;
}

/* ---------------- PLAYLIST ---------------- */

#playlist {
  height: 180px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.track {
  padding: 6px;
}

.track.active {
  color: #c00000;
  font-weight: bold;
  transform: scale(1.25);
}

/* ---------------- ACTIVE CONTROL ---------------- */

#activeControl {
  position: fixed;
  left: 38%;
  top: 50%;
  transform: translateY(-50%);
}

.playTriangle {
  width: 0;
  height: 0;

  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-bottom: 30px solid #c00000;
}

.playTriangle.spinning {
  animation: jumpSpin 1.8s cubic-bezier(.2,.8,.2,1) infinite;
}

@keyframes jumpSpin {
  0% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-4px) rotate(90deg); }
  50% { transform: translateY(0) rotate(180deg); }
  75% { transform: translateY(-3px) rotate(270deg); }
  100% { transform: translateY(0) rotate(360deg); }
}

/* ---------------- CONTROLS ---------------- */

#progressContainer {
  width: 100%;
  height: 6px;
  background: #eee;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: #c00000;
}

#volumeWrap {
  margin-top: 18px;
}

input[type=range] {
  width: 220px;
  accent-color: #c00000;
}

</style>
</head>

<body>

<div id="boot">

  <div id="title">
    T R I <div class="triangle"></div> G E
  </div>

  <div id="bootVer">v0.15.6</div>

  <div class="field" id="userField"></div>
  <div class="field" id="passField"></div>

  <div id="bootText">Wake up -U</div>

</div>

<div id="wrapper">

  <div id="panel">

    <div id="playlist"></div>

    <div id="progressContainer">
      <div id="progressBar"></div>
    </div>

    <div id="volumeWrap">
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
    </div>

  </div>

</div>

<div id="activeControl">
  <div class="playTriangle spinning"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

<script>

/* STATE */
let currentTrack = 0;
let sound = null;
let globalVolume = 1;

/* TRACKS */
const tracks = [
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3", volume: 0.1 },
  { title: "Announcement 1", file: "Announcement1.oga", volume: 0.6 },
  { title: "Control Yourself", file: "Edith Margaret Mudge - Triangle Agency - 01 Control Yourself.flac", volume: 0.05 },
  { title: "Stability", file: "Edith Margaret Mudge - Stability - Expansion Pack - 01 Stability - Loopable Extension.mp3", volume: 0.05 }
];

/* AUDIO */
function playTrack(i) {

  currentTrack = i;

  if (sound) sound.unload();

  sound = new Howl({
    src: [tracks[i].file],
    html5: true,
    volume: tracks[i].volume * globalVolume,

    onend: () => {
      if (currentTrack + 1 < tracks.length) playTrack(currentTrack + 1);
    }
  });

  sound.play();
  render();
}

/* PLAYLIST */
function render() {

  const list = document.getElementById("playlist");
  list.innerHTML = "";

  tracks.forEach((t, i) => {

    const div = document.createElement("div");
    div.className = "track";

    if (i === currentTrack) {
      div.classList.add("active");
    }

    div.innerText = t.title;
    div.onclick = () => playTrack(i);

    list.appendChild(div);
  });
}

/* ACTIVE CONTROL */
document.getElementById("activeControl").onclick = () => {
  if (!sound) return;

  if (sound.playing()) sound.pause();
  else sound.play();
};

/* BOOT */
async function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

async function typeUser(text){
  const el = document.getElementById("userField");
  for(let i=0;i<=text.length;i++){
    el.innerText = text.slice(0,i);
    await sleep(56);
  }
}

async function typePassword(text){
  const el = document.getElementById("passField");
  let masked="";
  for(let i=0;i<text.length;i++){
    el.innerText = masked + text[i];
    await sleep(72);
    masked+="*";
    el.innerText = masked;
    await sleep(36);
  }
}

async function bootSequence(){

  await typeUser("SusanSurandin");
  await sleep(800);

  await typePassword("WitnessMe");
  await sleep(600);

  document.getElementById("bootText").innerText = "INITIALIZING AUDIO SUBSYSTEM";
  await sleep(900);

  document.getElementById("bootText").innerText = "WELCOME BACK SUSAN";
  await sleep(800);

  document.getElementById("boot").style.display = "none";
  document.getElementById("wrapper").style.display = "flex";

  render();
  playTrack(0);
}

document.getElementById("boot").addEventListener("pointerdown", bootSequence);

</script>

</body>
</html>
