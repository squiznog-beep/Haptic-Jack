<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>TRI▲GE</title>

<style>
body {
  margin: 0;
  background: #ffffff;
  color: #c00000;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

#boot {
  text-align: center;
  cursor: pointer;
}

#title {
  font-size: 48px;
  letter-spacing: 8px;
  margin-bottom: 20px;
}

.triangle {
  display: inline-block;
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-bottom: 24px solid #c00000;
  margin: 0 4px;
}

#bootVer {
  display: block;
  margin-top: 10px;
  font-size: 14px;
  color: #000000; /* black version text */
}

#initText {
  margin-top: 30px;
  font-size: 18px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div id="boot">
  <div id="title">
    T R I <div class="triangle"></div> G E
  </div>
  <span id="bootVer">0.14g</span>
  <div id="initText">CLICK TO INITIALIZE</div>
</div>

<audio id="loginSfx" src="Notes5.oga" preload="auto"></audio>

<script>
const boot = document.getElementById("boot");
const sfx = document.getElementById("loginSfx");

boot.addEventListener("click", () => {
  document.getElementById("initText").innerText = "INITIALIZING...";
  
  setTimeout(() => {
    sfx.play();
  }, 400);

  setTimeout(() => {
    boot.innerHTML = "<div>BOOT COMPLETE</div>";
  }, 1200);
});
</script>

</body>
</html>
