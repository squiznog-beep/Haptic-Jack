<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player v0.08</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: white;
  overflow: hidden;
}

/* ---------------- BOOT SCREEN ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* TRIAGE HEADER */
#title {
  font-size: 32px;
  color: red;
  letter-spacing: 4px;
  margin-bottom: 40px;
}

/* fields */
.field {
  width: 260px;
  margin: 10px 0;
  border-bottom: 1px solid #333;
  padding: 6px;
  font-size: 14px;
  min-height: 20px;
}

.label {
  color: white;
  opacity: 0.7;
  margin-bottom: 4px;
}

/* boot text */
#bootText {
  margin-top: 40px;
  font-size: 18px;
  opacity: 0;
  transition: opacity 1s ease;
}

/* ---------------- PLAYER ---------------- */

.wrapper {
  max-width: 520px;
  margin: auto;
  padding: 20px;
  margin-top: 60px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  backdrop-filter: blur(20px);
}

#playlist {
  margin-top: 20px;
}

.track {
  text-align: center;
  padding: 6px;
  transition: all 0.25s ease;
  opacity: 0.2;
}

.track.active {
  font-weight: bold;
  opacity: 1;
  transform: scale(1.3);
}

.track.near {
  opacity: 0.5;
  transform: scale(0.95);
}

.track.far {
  opacity: 0.1;
  transform: scale(0.8);
}

/* ---------------- LOGO ---------------- */

#logo {
  position: fixed;
  bottom: 10px;
  left: 12px;
  font-size: 14px;
  opacity: 0.7;
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- ---------------- BOOT ---------------- -->
<div id="boot">
  <div id="title">T R I 🔺 G E</div>

  <div class="label">Username</div>
  <div class="field" id="userField"></div>

  <div class="label">Password</div>
  <div class="field" id="passField"></div>

  <div id="bootText">INITIALIZING...</div>
</div>

<!-- ---------------- PLAYER ---------------- -->
<div class="wrapper">
  <audio id="player" playsinline></audio>
  <div id="playlist"></div>
</div>

<!-- LOGO -->
<div id="logo">T R I 🔺 G E</div>

<!-- VERSION -->
<div id="version">
Last Functional Build: 0.07b<br>
Current Build: 0.08
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

/* ---------------- TRACKS ---------------- */

const tracks = [
  { title: "Intro: Welcome (Back)", file: "Notes5.oga", type: "audio/ogg" },
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes.mp3", type: "audio/mp3" },
  { title: "Announcement 1", file: "Announcement1.oga", type: "audio/ogg" },
  { title: "Announcement 2", file: "Announcement2.oga", type: "audio/ogg" },
  { title: "Announcement 3", file: "Announcement3.oga", type: "audio/ogg" },
  { title: "Announcement 4", file: "Announcement4.oga", type: "audio/ogg" },
  { title: "Announcement 6", file: "Announcement6.oga", type: "audio/ogg" }
];

const audio = document.getElementById("player");
const player = new Plyr(audio);

let currentTrack = 0;

/* ---------------- PLAY TRACK ---------------- */

function playTrack(i) {
  currentTrack = i;

  player.source = {
    type: 'audio',
    sources: [{
      src: tracks[i].file,
      type: tracks[i].type
    }]
  };

  player.play().catch(()=>{});

  renderPlaylist();
}

/* ---------------- PLAYLIST ---------------- */

const playlistEl = document.getElementById("playlist");

function renderPlaylist() {
  playlistEl.innerHTML = "";

  const start = Math.max(0, currentTrack - 2);
  const end = Math.min(tracks.length - 1, currentTrack + 2);

  for (let i = start; i <= end; i++) {

    const el = document.createElement("div");
    el.className = "track";

    if (i === currentTrack) el.classList.add("active");
    else el.classList.add("near");

    el.innerText = tracks[i].title;
    el.onclick = () => playTrack(i);

    playlistEl.appendChild(el);
  }
}

/* ---------------- PASSWORD (FIXED PER-LETTER MASK) ---------------- */

function typePassword(el, text, cb) {
  let i = 0;

  function step() {
    if (i >= text.length) {
      cb?.();
      return;
    }

    // show one more real character
    let visible = text.slice(0, i + 1);
    el.innerText = visible;

    setTimeout(() => {

      // mask ONLY up to current progress
      let masked = "";
      for (let j = 0; j <= i; j++) masked += "*";

      el.innerText = masked;

      i++;
      setTimeout(step, 100);

    }, 100);
  }

  step();
}

/* ---------------- USER TYPE ---------------- */

function typeUser(el, text, cb) {
  let i = 0;

  const t = setInterval(() => {
    el.innerText = text.slice(0, i++);
    if (i > text.length) {
      clearInterval(t);
      cb?.();
    }
  }, 40);
}

/* ---------------- BOOT (1500ms FIX) ---------------- */

function boot() {

  const startTime = performance.now();

  const u = document.getElementById("userField");
  const p = document.getElementById("passField");
  const bootText = document.getElementById("bootText");

  typeUser(u, "SusanSurandin", () => {

    typePassword(p, "WitnessMe", () => {

      bootText.style.opacity = 1;
      bootText.innerText = "WELCOME BACK SUSAN";

      const delay = 1500;

      setTimeout(() => {
        document.getElementById("boot").style.display = "none";
        playTrack(0);
      }, delay);

    });

  });
}

/* ---------------- INIT ---------------- */

window.addEventListener("click", boot, { once: true });
window.addEventListener("load", renderPlaylist);

</script>

</body>
</html>
