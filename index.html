<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Audio Player</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1a1a, #0c0c0c);
  font-family: system-ui, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  padding: 40px 10px;
}

.player-wrapper {
  width: 100%;
  max-width: 480px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

button {
  margin: 5px 5px 10px 0;
  padding: 6px 10px;
  cursor: pointer;
  border-radius: 6px;
  border: none;
}

#playlist {
  margin-top: 10px;
}

.track {
  padding: 6px 0;
  cursor: pointer;
  opacity: 0.7;
}

.track:hover { opacity: 1; }

.track.active {
  opacity: 1;
  font-weight: 600;
}

#volumeBox {
  margin-top: 15px;
}

#volumeBox input {
  width: 100%;
}

#volumeBox input[type="number"] {
  width: 70px;
  margin-top: 6px;
}

#status {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="player-wrapper">

  <!-- REAL AUDIO ELEMENT -->
  <audio id="player" controls></audio>

  <!-- CONTROLS -->
  <div>
    <button id="playBtn">Play</button>
    <button id="pauseBtn">Pause</button>
    <button id="loopBtn">Loop: Off</button>
  </div>

  <div id="status">Idle</div>

  <div id="playlist"></div>

  <!-- VOLUME -->
  <div id="volumeBox">
    <label>Volume</label><br>
    <input id="volSlider" type="range" min="0" max="100" value="10">
    <input id="volInput" type="number" min="0" max="100" value="10">
  </div>

</div>

<script>

/* ---------------- TRACKS ---------------- */

const tracks = [
  { title: "Welcome (Back)", file: "Notes5.oga" },
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3" }
];

/* ---------------- STATE ---------------- */

const audio = document.getElementById("player");
const playBtn = document.getElementById("playBtn");
const pauseBtn = document.getElementById("pauseBtn");
const loopBtn = document.getElementById("loopBtn");
const playlist = document.getElementById("playlist");
const status = document.getElementById("status");

const volSlider = document.getElementById("volSlider");
const volInput = document.getElementById("volInput");

let currentTrack = 0;
let loopEnabled = false;

/* ---------------- VOLUME ---------------- */

function setVolume(v) {
  const clamped = Math.max(0, Math.min(100, Number(v)));
  audio.volume = clamped / 100;
  volSlider.value = clamped;
  volInput.value = clamped;
}

volSlider.addEventListener("input", e => setVolume(e.target.value));
volInput.addEventListener("input", e => setVolume(e.target.value));

setVolume(10);

/* ---------------- PLAYER CONTROLS ---------------- */

playBtn.onclick = () => audio.play();
pauseBtn.onclick = () => audio.pause();

/* ---------------- TRACK LOADING ---------------- */

function loadTrack(index) {
  currentTrack = index;
  audio.src = tracks[index].file;
  audio.play().catch(()=>{});
  updateActive();
}

/* ---------------- PLAYLIST ---------------- */

tracks.forEach((t, i) => {
  if (i === 0) return;

  const div = document.createElement("div");
  div.className = "track";
  div.innerText = t.title;
  div.onclick = () => loadTrack(i);
  playlist.appendChild(div);
});

function updateActive() {
  document.querySelectorAll(".track").forEach((el, i) => {
    el.classList.toggle("active", i + 1 === currentTrack);
  });
}

/* ---------------- LOOP ---------------- */

loopBtn.onclick = () => {
  loopEnabled = !loopEnabled;
  loopBtn.innerText = loopEnabled ? "Loop: On" : "Loop: Off";
};

/* ---------------- END LOGIC ---------------- */

audio.addEventListener("ended", () => {
  if (!loopEnabled) {
    let next = currentTrack + 1;
    if (next >= tracks.length) {
      status.innerText = "Finished";
    } else {
      loadTrack(next);
    }
  } else {
    audio.currentTime = 0;
    audio.play();
  }
});

/* ---------------- INTRO ---------------- */

audio.src = tracks[0].file;

audio.addEventListener("canplay", function introStart() {
  audio.removeEventListener("canplay", introStart);

  setVolume(70);

  audio.play().catch(() => {});
});

</script>

</body>
</html>
