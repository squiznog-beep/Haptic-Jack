<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player v0.07h</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: white;
  overflow: hidden;
}

/* ---------------- BOOT ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ============================= */
/* FIXED TRIAGE LOGO (CONSISTENT) */
/* ============================= */

#title {
  color: red;
  font-size: 32px;
  letter-spacing: 4px; /* FIX: prevents squish */
  margin-bottom: 30px;
  display: flex;
  align-items: center;
  line-height: 1;
}

/* triangle matches font height EXACTLY */
.triangle {
  width: 0.85em;
  height: 0.85em;
  background: red;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  display: inline-block;
  margin: 0 6px;
  transform: translateY(0.05em);
}

/* ---------------- FIELDS ---------------- */

.field {
  width: 260px;
  border-bottom: 1px solid #333;
  padding: 6px;
  font-size: 14px;
  min-height: 20px;
}

.label {
  opacity: 0.7;
  margin-top: 10px;
}

/* ---------------- PLAYER ---------------- */

.wrapper {
  max-width: 520px;
  margin: auto;
  margin-top: 60px;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
}

/* ---------------- PLAYLIST WINDOW ---------------- */

#playlist {
  margin-top: 20px;
  text-align: center;
}

.track {
  opacity: 0.25;
  transform: scale(0.85);
  transition: 0.2s;
  padding: 4px;
}

.track.active {
  opacity: 1;
  font-weight: bold;
  transform: scale(1.35);
}

/* ---------------- LOGO ---------------- */

#logo {
  position: fixed;
  bottom: 10px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  opacity: 0.7;
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  <div id="title">
    T R I <span class="triangle"></span> G E
  </div>

  <div class="label">Username</div>
  <div class="field" id="userField"></div>

  <div class="label">Password</div>
  <div class="field" id="passField"></div>

  <div id="bootText">INITIALIZING...</div>
</div>

<!-- PLAYER -->
<div class="wrapper">
  <audio id="player" playsinline></audio>
  <div id="playlist"></div>
</div>

<!-- LOGO -->
<div id="logo">
  T R I <span class="triangle"></span> G E
</div>

<div id="version">
Last Functional Build: 0.07f<br>
Current Build: 0.07h
</div>

<script>

const tracks = [
  { title: "Intro: Welcome (Back)", file: "Notes5.oga", type: "audio/ogg" },
  {
    title: "Prologue",
    file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3",
    type: "audio/mp3"
  },
  { title: "Announcement 1", file: "Announcement1.oga", type: "audio/ogg" },
  { title: "Announcement 2", file: "Announcement2.oga", type: "audio/ogg" },
  { title: "Announcement 3", file: "Announcement3.oga", type: "audio/ogg" },
  { title: "Announcement 4", file: "Announcement4.oga", type: "audio/ogg" },
  { title: "Announcement 6", file: "Announcement6.oga", type: "audio/ogg" }
];

const audio = document.getElementById("player");

let currentTrack = 0;

/* ---------------- CLEAN PLAYBACK PIPELINE (FIX PROLOGUE) ---------------- */

function playTrack(i) {
  currentTrack = i;

  audio.pause();
  audio.removeAttribute("src");
  audio.load();

  audio.src = tracks[i].file;

  const playPromise = audio.play();
  if (playPromise !== undefined) {
    playPromise.catch(() => {});
  }

  renderPlaylist();
}

/* ---------------- PLAYLIST ---------------- */

const playlistEl = document.getElementById("playlist");

function renderPlaylist() {
  playlistEl.innerHTML = "";

  const start = Math.max(0, currentTrack - 2);
  const end = Math.min(tracks.length - 1, currentTrack + 2);

  for (let i = start; i <= end; i++) {
    const el = document.createElement("div");
    el.className = "track";

    if (i === currentTrack) el.classList.add("active");

    el.innerText = tracks[i].title;
    el.onclick = () => playTrack(i);

    playlistEl.appendChild(el);
  }
}

/* ---------------- BOOT (FIXED 1500ms TIMING) ---------------- */

function boot() {

  const start = performance.now();

  const u = document.getElementById("userField");
  const p = document.getElementById("passField");

  u.innerText = "SusanSurandin";

  let pw = "WitnessMe";
  let masked = "*".repeat(pw.length);
  p.innerText = masked;

  const delay = Math.max(0, 1500 - (performance.now() - start));

  setTimeout(() => {
    document.getElementById("boot").style.display = "none";
    playTrack(0);
  }, delay);
}

window.addEventListener("click", boot, { once: true });
window.addEventListener("load", renderPlaylist);

</script>

</body>
</html>
