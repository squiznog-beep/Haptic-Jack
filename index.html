<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Audio Player</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1a1a, #0c0c0c);
  font-family: system-ui, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  padding: 40px 10px;
}

.player-wrapper {
  width: 100%;
  max-width: 480px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

#toggle {
  cursor: pointer;
  font-size: 14px;
  opacity: 0.7;
  margin: 10px 0;
}

#playlist {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

#playlist.open {
  max-height: 200px;
}

.track {
  padding: 6px 0;
  cursor: pointer;
  opacity: 0.7;
}

.track:hover {
  opacity: 1;
}

.track.active {
  opacity: 1;
  font-weight: 600;
}

#status {
  font-size: 12px;
  opacity: 0;
  margin-top: 8px;
  transition: opacity 0.4s ease;
}

#status.show {
  opacity: 0.8;
}

#loopBtn {
  margin-top: 10px;
  cursor: pointer;
  font-size: 13px;
  opacity: 0.6;
}

#loopBtn.active {
  opacity: 1;
  font-weight: 600;
}

#volumeBox {
  margin-top: 15px;
}

#volumeBox input[type="range"] {
  width: 100%;
}

#volumeBox input[type="number"] {
  width: 70px;
  margin-top: 6px;
}
</style>
</head>

<body>

<div class="player-wrapper">

  <audio id="player"></audio>

  <div id="loopBtn">Loop: Off</div>
  <div id="toggle">Show Playlist</div>
  <div id="playlist"></div>
  <div id="status">Now Resuming...</div>

  <!-- VOLUME UI -->
  <div id="volumeBox">
    <label style="font-size:12px;opacity:0.7;">Volume</label><br>
    <input id="volSlider" type="range" min="0" max="100" value="10">
    <input id="volInput" type="number" min="0" max="100" value="10">
  </div>

</div>

<script>

/* ---------------- TRACKS ---------------- */

const tracks = [
  { title: "Welcome (Back)", file: "Notes5.oga" },
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3" }
];

/* ---------------- STATE ---------------- */

const audio = document.getElementById("player");
const playlist = document.getElementById("playlist");
const toggle = document.getElementById("toggle");
const statusText = document.getElementById("status");
const loopBtn = document.getElementById("loopBtn");

const volSlider = document.getElementById("volSlider");
const volInput = document.getElementById("volInput");

let currentTrack = 0;
let introDone = false;
let loopEnabled = false;

/* ---------------- VOLUME ---------------- */

function setVolume(v) {
  const clamped = Math.max(0, Math.min(100, Number(v)));
  const normalized = clamped / 100;

  audio.volume = normalized;

  volSlider.value = clamped;
  volInput.value = clamped;
}

volSlider.addEventListener("input", e => setVolume(e.target.value));
volInput.addEventListener("input", e => setVolume(e.target.value));

setVolume(10);

/* ---------------- PLAYLIST ---------------- */

tracks.forEach((track, index) => {
  if (index === 0) return;

  const div = document.createElement("div");
  div.className = "track";
  div.innerText = track.title;
  div.onclick = () => loadTrack(index);
  playlist.appendChild(div);
});

function updateActive() {
  document.querySelectorAll(".track").forEach((el, i) => {
    el.classList.toggle("active", i + 1 === currentTrack);
  });
}

/* ---------------- LOAD TRACK ---------------- */

function loadTrack(index, resumeTime = 0) {
  currentTrack = index;
  audio.src = tracks[index].file;

  audio.addEventListener("loadedmetadata", function setTime() {
    if (resumeTime > 0) {
      audio.currentTime = resumeTime;
    }
    audio.removeEventListener("loadedmetadata", setTime);
  });

  audio.play().catch(err => {
    console.log("Play blocked:", err);
  });

  updateActive();
}

/* ---------------- END LOGIC ---------------- */

audio.addEventListener("ended", () => {

  if (!introDone && currentTrack === 0) {
    introDone = true;

    setVolume(10);

    const savedTrack = parseInt(localStorage.getItem("lastTrack"));
    const savedTime = parseFloat(localStorage.getItem("lastTime"));
    const lastSession = parseInt(localStorage.getItem("lastSession"));

    const now = Date.now();
    const oneHour = 60 * 60 * 1000;

    let shouldResume =
      !isNaN(savedTrack) &&
      savedTrack > 0 &&
      lastSession &&
      now - lastSession <= oneHour;

    if (shouldResume) {
      statusText.classList.add("show");

      loadTrack(savedTrack, savedTime || 0);

      setTimeout(() => statusText.classList.remove("show"), 2000);

    } else {
      loadTrack(1);
    }

    return;
  }

  if (!loopEnabled) {
    let next = currentTrack + 1;

    if (next >= tracks.length) {
      audio.pause();
    } else {
      loadTrack(next);
    }
  } else {
    audio.currentTime = 0;
    audio.play();
  }
});

/* ---------------- SAVE PROGRESS ---------------- */

audio.addEventListener("timeupdate", () => {
  localStorage.setItem("lastTrack", currentTrack);
  localStorage.setItem("lastTime", audio.currentTime);
  localStorage.setItem("lastSession", Date.now());
});

/* ---------------- LOOP ---------------- */

loopBtn.onclick = () => {
  loopEnabled = !loopEnabled;
  loopBtn.innerText = loopEnabled ? "Loop: On" : "Loop: Off";
  loopBtn.classList.toggle("active");
};

/* ---------------- UI ---------------- */

toggle.onclick = () => {
  playlist.classList.toggle("open");
  toggle.innerText = playlist.classList.contains("open")
    ? "Hide Playlist"
    : "Show Playlist";
};

/* ---------------- INTRO START ---------------- */

audio.src = tracks[0].file;

audio.addEventListener("canplay", function introStart() {
  audio.removeEventListener("canplay", introStart);

  setVolume(70);

  audio.play().catch(err => {
    console.log("Intro play blocked:", err);
  });
});

</script>

</body>
</html>
