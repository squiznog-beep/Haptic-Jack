<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Amplitude Volume Test</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/amplitudejs@5.3.2/dist/amplitude.min.css"/>

<style>
body {
  font-family: monospace;
  background: white;
  color: black;
  padding: 40px;
}

.track {
  cursor: pointer;
  margin: 8px 0;
}

.track.active {
  color: #b30000;
  font-weight: bold;
}

#player {
  margin-top: 20px;
}

.amplitude-volume-slider {
  width: 200px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>Amplitude Test Player</h2>

<div id="playlist"></div>

<!-- REQUIRED UI ELEMENTS FOR AMPLITUDE -->
<div id="player">
  <div class="amplitude-play-pause">Play</div>
  <input type="range" class="amplitude-volume-slider"/>
  <input type="range" class="amplitude-song-slider"/>
</div>

<script src="https://cdn.jsdelivr.net/npm/amplitudejs@5.3.2/dist/amplitude.min.js"></script>

<script>

/* TRACKS */

const tracks = [
  {
    name: "Prologue",
    url: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3"
  },
  {
    name: "Announcement 1",
    url: "Announcement1.oga"
  },
  {
    name: "Control Yourself",
    url: "Edith Margaret Mudge - Triangle Agency - 01 Control Yourself.flac"
  }
];

/* INIT */

Amplitude.init({
  songs: tracks,
  volume: 0.5
});

/* FORCE REAL AUDIO SYNC (THIS IS THE FIX) */

function syncVolume() {
  const audio = Amplitude.audio();
  if (!audio) return;

  audio.volume = Amplitude.getVolume();
}

/* bind slider + state changes */
Amplitude.bind('volume_change', syncVolume);
Amplitude.bind('song_change', syncVolume);

/* PLAYLIST */

const el = document.getElementById("playlist");

tracks.forEach((t, i) => {
  const div = document.createElement("div");
  div.className = "track";
  div.innerText = t.name;

  div.onclick = () => {
    Amplitude.playSongAtIndex(i);
  };

  el.appendChild(div);
});

/* highlight active */
setInterval(() => {
  const idx = Amplitude.getActiveIndex();

  document.querySelectorAll(".track").forEach((t, i) => {
    t.classList.toggle("active", i === idx);
  });
}, 200);

</script>

</body>
</html>
