<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player – Howler Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.wrapper {
  width: 420px;
  padding: 30px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  backdrop-filter: blur(20px);
  text-align: center;
}

button {
  margin: 20px 0;
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}

input[type="range"] {
  width: 100%;
}
</style>
</head>

<body>

<div class="wrapper">
  <h2>Prologue</h2>

  <button id="playBtn">Play</button>

  <div>
    <label>Volume</label>
    <input id="volumeSlider"
           type="range"
           min="0"
           max="1"
           step="0.01"
           value="1">
  </div>
</div>

<script>

// EXACT file name from your original build
const sound = new Howl({
  src: ["The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3"],
  html5: false,   // FORCE WebAudio
  volume: 1
});

let playing = false;

const playBtn = document.getElementById("playBtn");
const slider = document.getElementById("volumeSlider");

playBtn.addEventListener("click", () => {

  if (!playing) {
    sound.play();
    playBtn.textContent = "Pause";
    playing = true;
  } else {
    sound.pause();
    playBtn.textContent = "Play";
    playing = false;
  }

});

slider.addEventListener("input", (e) => {
  sound.volume(parseFloat(e.target.value));
});

</script>

</body>
</html>
