<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Audio Player</title>
</head>

<body style="background:#111;color:white;font-family:sans-serif;padding:20px;">

<h3>Audio Player</h3>

<audio id="audio" controls></audio>

<br><br>

<label>Volume</label>
<input id="vol" type="range" min="0" max="100" step="1" value="10">

<p id="status">Loading...</p>

<script>

const audio = document.getElementById("audio");
const vol = document.getElementById("vol");
const status = document.getElementById("status");

const tracks = [
  "Notes5.oga",
  "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3"
];

let currentTrack = 0;

/* ---------------- VOLUME ---------------- */

function setVolume(percent){
  const value = percent / 100;
  audio.volume = value;
  vol.value = percent;
}

vol.addEventListener("input", e => {
  setVolume(e.target.value);
});

/* ---------------- LOAD TRACK ---------------- */

function loadTrack(index){
  currentTrack = index;
  audio.src = tracks[index];
}

/* ---------------- AUTO NEXT ---------------- */

audio.addEventListener("ended", () => {

  if(currentTrack === 0){
    // intro finished
    loadTrack(1);
    setVolume(10); // drop to 10% AFTER intro
    audio.play();
  }
  else{
    // end of playlist
    status.innerText = "Playback finished";
  }
});

/* ---------------- AUTOPLAY INTRO ---------------- */

function startIntro(){

  currentTrack = 0;
  loadTrack(0);

  setVolume(70); // intro at 70%

  audio.play()
    .then(() => {
      status.innerText = "Intro playing";
    })
    .catch(err => {
      status.innerText = "Autoplay blocked";
    });
}

// initialize properly
loadTrack(0);
setVolume(10);
status.innerText = "Ready";

// autoplay on page load
window.addEventListener("load", () => {
  startIntro();
});

</script>

</body>
</html>
