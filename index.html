<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Audio Player</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1a1a, #0c0c0c);
  font-family: system-ui, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  padding: 40px 10px;
}

.player-wrapper {
  width: 100%;
  max-width: 520px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.track {
  padding: 6px 0;
  cursor: pointer;
  opacity: 0.7;
}

.track:hover { opacity: 1; }

.track.active {
  opacity: 1;
  font-weight: 600;
}

#volumeBox {
  margin-top: 12px;
}

#volumeSlider {
  width: 100%;
}
</style>
</head>

<body>

<div class="player-wrapper">

  <!-- REAL AUDIO ENGINE -->
  <audio id="player" controls></audio>

  <div id="playlist"></div>

  <div id="volumeBox">
    <div id="volLabel">Volume: 10%</div>
    <input id="volumeSlider" type="range" min="0" max="100" value="10">
  </div>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

/* ---------------- TRACKS ---------------- */

const tracks = [
  { title: "Welcome (Back)", file: "Notes5.oga" },
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3" }
];

/* ---------------- ELEMENTS ---------------- */

const audio = document.getElementById("player");
const slider = document.getElementById("volumeSlider");
const label = document.getElementById("volLabel");
const playlist = document.getElementById("playlist");

/* ---------------- PLYR (UI ONLY) ---------------- */

const player = new Plyr(audio);

/* ---------------- VOLUME (REAL CONTROL POINT) ---------------- */

function setVolume(v) {
  const val = Math.max(0, Math.min(100, Number(v)));

  // THIS is the ONLY real audio control
  audio.volume = val / 100;

  // UI sync
  slider.value = val;
  label.innerText = `Volume: ${val}%`;

  // force Plyr UI sync (important fix)
  player.volume = val / 100;
}

slider.addEventListener("input", e => {
  setVolume(e.target.value);
});

setVolume(10);

/* ---------------- PLAYLIST ---------------- */

let currentTrack = 0;

tracks.forEach((t, i) => {
  if (i === 0) return;

  const div = document.createElement("div");
  div.className = "track";
  div.innerText = t.title;
  div.onclick = () => loadTrack(i);
  playlist.appendChild(div);
});

/* ---------------- TRACK LOADING ---------------- */

function loadTrack(i) {
  currentTrack = i;
  audio.src = tracks[i].file;
  audio.play().catch(()=>{});
}

/* ---------------- AUTOPLAY FIX ---------------- */

window.addEventListener("load", () => {
  audio.src = tracks[0].file;

  setTimeout(() => {
    audio.play().catch(()=>{});
  }, 200);
});

/* ---------------- DEBUG SAFETY ---------------- */

// keep Plyr synced if anything else changes volume
audio.addEventListener("volumechange", () => {
  const v = audio.volume * 100;
  slider.value = v;
  label.innerText = `Volume: ${Math.round(v)}%`;
  player.volume = audio.volume;
});

</script>

</body>
</html>
