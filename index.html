<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player v0.08c</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: white;
  overflow: hidden;
}

/* ---------------- BOOT ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* ---------------- TRIAGE (RESTORED 0.07 STYLE) ---------------- */

#title {
  font-size: 32px;
  color: red;
  letter-spacing: 4px;
  margin-bottom: 40px;
  display: flex;
  align-items: center;
}

/* FIX: stable triangle sizing (NO scaling drift) */
.triangle {
  width: 14px;
  height: 14px;
  background: red;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  display: inline-block;
  margin: 0 6px;
  transform: translateY(1px); /* subtle alignment only */
}

.field {
  width: 260px;
  margin: 10px 0;
  border-bottom: 1px solid #333;
  padding: 6px;
  font-size: 14px;
  min-height: 20px;
}

.label {
  opacity: 0.7;
}

/* boot text */
#bootText {
  margin-top: 40px;
  font-size: 18px;
  opacity: 0;
}

/* ---------------- PLAYER ---------------- */

.wrapper {
  max-width: 520px;
  margin: auto;
  padding: 20px;
  margin-top: 60px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
}

/* playlist */
#playlist {
  margin-top: 20px;
}

.track {
  text-align: center;
  padding: 6px;
  opacity: 0.2;
  transition: 0.2s;
}

.track.active {
  font-weight: bold;
  opacity: 1;
  transform: scale(1.3);
}

.track.near {
  opacity: 0.5;
  transform: scale(0.95);
}

/* ---------------- LOGO ---------------- */

#logo {
  position: fixed;
  bottom: 10px;
  left: 12px;
  font-size: 14px;
  opacity: 0.7;
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  <div id="title">T R I <span class="triangle"></span> G E</div>

  <div class="label">Username</div>
  <div class="field" id="userField"></div>

  <div class="label">Password</div>
  <div class="field" id="passField"></div>

  <div id="bootText">INITIALIZING...</div>
</div>

<!-- PLAYER -->
<div class="wrapper">
  <audio id="player" playsinline></audio>
  <div id="playlist"></div>
</div>

<!-- LOGO -->
<div id="logo">T R I 🔺 G E</div>

<div id="version">
Last Functional Build: 0.07b<br>
Current Build: 0.08c
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

const tracks = [
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes.mp3", type: "audio/mp3" },
  { title: "Announcement 1", file: "Announcement1.oga", type: "audio/ogg" },
  { title: "Announcement 2", file: "Announcement2.oga", type: "audio/ogg" },
  { title: "Announcement 3", file: "Announcement3.oga", type: "audio/ogg" },
  { title: "Announcement 4", file: "Announcement4.oga", type: "audio/ogg" },
  { title: "Announcement 6", file: "Announcement6.oga", type: "audio/ogg" }
];

const audio = document.getElementById("player");
const player = new Plyr(audio);

let currentTrack = 0;

/* ---------------- FIXED AUDIO PIPELINE (RESTORED 0.07 BEHAVIOR) ---------------- */

function playTrack(i) {
  currentTrack = i;

  player.source = {
    type: 'audio',
    sources: [{
      src: tracks[i].file,
      type: tracks[i].type
    }]
  };

  player.play().catch(()=>{});
  renderPlaylist();
}

/* ---------------- PLAYLIST ---------------- */

const playlistEl = document.getElementById("playlist");

function renderPlaylist() {
  playlistEl.innerHTML = "";

  const start = Math.max(0, currentTrack - 2);
  const end = Math.min(tracks.length - 1, currentTrack + 2);

  for (let i = start; i <= end; i++) {
    const el = document.createElement("div");
    el.className = "track";

    if (i === currentTrack) el.classList.add("active");
    else el.classList.add("near");

    el.innerText = tracks[i].title;
    el.onclick = () => playTrack(i);

    playlistEl.appendChild(el);
  }
}

/* ---------------- PASSWORD (LINE-BY-LINE FIXED) ---------------- */

function typePassword(el, text, cb) {
  let i = 0;
  let lines = [];

  function step() {
    if (i >= text.length) {
      cb?.();
      return;
    }

    lines.push(text.slice(0, i + 1));

    // render "history stack"
    el.innerText = lines.join("\n");

    setTimeout(() => {
      i++;
      step();
    }, 120);
  }

  step();
}

/* ---------------- USER ---------------- */

function typeUser(el, text, cb) {
  let i = 0;

  const t = setInterval(() => {
    el.innerText = text.slice(0, i++);
    if (i > text.length) {
      clearInterval(t);
      cb?.();
    }
  }, 40);
}

/* ---------------- BOOT (FIXED SFX TIMING) ---------------- */

function boot() {

  const u = document.getElementById("userField");
  const p = document.getElementById("passField");
  const bootText = document.getElementById("bootText");

  typeUser(u, "SusanSurandin", () => {

    typePassword(p, "WitnessMe", () => {

      bootText.style.opacity = 1;
      bootText.innerText = "WELCOME BACK SUSAN";

      /* FIX: SFX now correctly tied to LOGIN CLICK CONTEXT */
      setTimeout(() => {
        const sfx = new Audio("Notes5.oga");
        sfx.play().catch(()=>{});
      }, 800);

      setTimeout(() => {
        document.getElementById("boot").style.display = "none";
        playTrack(0);
      }, 1500);

    });

  });
}

/* INIT */

window.addEventListener("click", boot, { once: true });
window.addEventListener("load", renderPlaylist);

</script>

</body>
</html>
