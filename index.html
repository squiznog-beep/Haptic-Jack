<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Audio Test</title>
</head>

<body style="background:#111;color:white;font-family:sans-serif;padding:20px;">

<h3>Audio Diagnostic</h3>

<audio id="audio" controls></audio>

<br><br>

<button onclick="start()">Start Intro</button>

<br><br>

<label>Volume</label>
<input id="vol" type="range" min="0" max="100" value="10">

<p id="status">Idle</p>

<script>

const audio = document.getElementById("audio");
const vol = document.getElementById("vol");
const status = document.getElementById("status");

const tracks = [
  "Notes5.oga",
  "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3"
];

let i = 0;

/* volume */
function setVolume(v){
  audio.volume = v / 100;
  vol.value = v;
}
vol.oninput = e => setVolume(e.target.value);
setVolume(10);

/* autoplay test */
function start(){
  audio.src = tracks[0];

  audio.play()
    .then(() => {
      status.innerText = "Intro playing";
    })
    .catch(err => {
      status.innerText = "Autoplay blocked: " + err;
    });
}

/* auto next */
audio.onended = () => {
  i++;

  if(i >= tracks.length){
    status.innerText = "Done";
    return;
  }

  audio.src = tracks[i];
  audio.play();
};

</script>

</body>
</html>
