<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  padding: 40px;
  background: radial-gradient(circle at top, #1a1a1a, #0c0c0c);
  font-family: system-ui, sans-serif;
  color: white;
}

.wrapper {
  max-width: 500px;
  margin: auto;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
}

#playlist {
  margin-top: 20px;
}

.track {
  cursor: pointer;
  opacity: 0.7;
  padding: 5px 0;
}

.track:hover {
  opacity: 1;
}

.track.active {
  font-weight: bold;
  opacity: 1;
}

#status {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 10px;
}

#version {
  position: fixed;
  bottom: 8px;
  right: 12px;
  font-size: 11px;
  opacity: 0.4;
}
</style>
</head>

<body>

<div class="wrapper">

<audio id="player" playsinline></audio>

<div id="playlist"></div>

<div id="status">Initializing...</div>

</div>

<div id="version">v0.01</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

const tracks = [
  { title: "Welcome (Back)", file: "Notes5.oga", volume: 0.70 },
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3", volume: 0.10 }
];

const audio = document.getElementById("player");
const playlistEl = document.getElementById("playlist");
const status = document.getElementById("status");

let currentTrack = 0;

const player = new Plyr(audio, {
  controls: [
    'play',
    'progress',
    'current-time',
    'mute',
    'volume'
  ]
});

/* ---------------- PLAYLIST BUILD ---------------- */

tracks.forEach((track, index) => {

  const div = document.createElement("div");
  div.className = "track";
  div.innerText = track.title;

  div.onclick = () => {
    playTrack(index);
  };

  playlistEl.appendChild(div);
});

/* ---------------- UI UPDATE ---------------- */

function updateActive(){
  document.querySelectorAll(".track").forEach((el, i)=>{
    el.classList.toggle("active", i === currentTrack);
  });
}

/* ---------------- PLAY TRACK ---------------- */

function playTrack(index){

  currentTrack = index;

  player.source = {
    type: 'audio',
    sources: [
      {
        src: tracks[index].file,
        type: tracks[index].file.endsWith(".oga") ? "audio/ogg" : "audio/mp3"
      }
    ]
  };

  updateActive();

  player.muted = true;

  player.play().then(()=>{
    player.volume = tracks[index].volume;
    player.muted = false;
  }).catch(()=>{
    status.innerText = "Autoplay blocked";
  });

}

/* ---------------- AUTO NEXT ---------------- */

player.on("ended", () => {

  if(currentTrack === 0){
    playTrack(1);
  } else {
    status.innerText = "Playback complete";
  }

});

/* ---------------- INIT ---------------- */

window.addEventListener("load", () => {
  playTrack(0);
  status.innerText = "Ready";
});

</script>

</body>
</html>
