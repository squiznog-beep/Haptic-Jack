<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>TRI▲GE v0.15.6.1</title>

<style>

body {
  margin: 0;
  background: white;
  font-family: monospace;
  overflow: hidden;
  color: black;
}

/* ---------------- BOOT ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: white;
  z-index: 9999;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* HEADER */
#title {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;

  letter-spacing: 4px;
  font-size: 40px;
  color: #c00000;

  transform: translateX(6px);
}

.triangle {
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-bottom: 24px solid #c00000;

  margin-left: 12px;
  margin-right: 22px;
}

/* BOOT TEXT */
#bootText {
  margin-top: 28px;
  color: #4a90ff;
  animation: pulse 5s ease-in-out infinite;
}

@keyframes pulse {
  0% { opacity: 0; }
  25% { opacity: 0.8; }
  55% { opacity: 0.8; }
  100% { opacity: 0; }
}

/* ---------------- PLAYER ---------------- */

#wrapper {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

#panel {
  width: 520px;
  text-align: center;
}

/* ---------------- PLAYLIST ---------------- */

#playlist {
  height: 180px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.track {
  padding: 6px;
}

.track.active {
  color: #c00000;
  font-weight: bold;
  transform: scale(1.25);
}

/* ---------------- FLOAT CONTROL ---------------- */

#activeControl {
  position: fixed;
  left: calc(50% - 220px);
  top: 50%;
  transform: translateY(-50%);
}

.playTriangle {
  width: 0;
  height: 0;
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-bottom: 30px solid #c00000;
}

.playTriangle.spinning {
  animation: smoothSpin 2.8s linear infinite;
}

@keyframes smoothSpin {
  0% { transform: rotate(0deg); }
  25% { transform: rotate(90deg); }
  50% { transform: rotate(180deg); }
  75% { transform: rotate(270deg); }
  100% { transform: rotate(360deg); }
}

/* ---------------- PROGRESS ---------------- */

#progressContainer {
  width: 100%;
  height: 6px;
  background: #e8e8e8;
}

#progressBar {
  width: 0%;
  height: 100%;
  background: #c00000;
}

/* ---------------- VOLUME ---------------- */

#volumeWrap {
  margin-top: 18px;
}

input[type=range] {
  width: 220px;
  accent-color: #c00000;
}

/* ---------------- CORNER LOGO ---------------- */

#cornerLogo {
  position: fixed;
  bottom: 10px;
  left: 12px;
  display: flex;
  align-items: center;

  color: #c00000;
  letter-spacing: 6px;
}

#cornerLogo .triangle {
  margin-left: 12px;
  margin-right: 22px;
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.6;
}

</style>
</head>

<body>

<div id="boot">

  <div id="title">
    <span>T</span><span>R</span><span>I</span>
    <div class="triangle"></div>
    <span>G</span><span>E</span>
  </div>

  <div id="bootText">Wake up -U</div>
</div>

<div id="wrapper">

  <div id="panel">
    <div id="playlist"></div>

    <div id="progressContainer">
      <div id="progressBar"></div>
    </div>

    <div id="volumeWrap">
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
    </div>
  </div>

</div>

<div id="activeControl">
  <div class="playTriangle spinning"></div>
</div>

<div id="cornerLogo">
  T R I <div class="triangle"></div> G E
</div>

<div id="version">
Last Functional Build: N/A<br>
Current Build: 0.15.6.1
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

<script>

let currentTrack = 0;
let sound = null;
let globalVolume = 1;
let bootLocked = false;

const tracks = [
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3", volume: 0.1 },
  { title: "Announcement 1", file: "Announcement1.oga", volume: 0.6 },
  { title: "Control Yourself", file: "Edith Margaret Mudge - Triangle Agency - 01 Control Yourself.flac", volume: 0.05 },
  { title: "Stability", file: "Edith Margaret Mudge - Stability - Expansion Pack - 01 Stability - Loopable Extension.mp3", volume: 0.05 }
];

function playTrack(i) {

  currentTrack = i;

  if (sound) sound.unload();

  sound = new Howl({
    src: [tracks[i].file],
    html5: true,
    volume: tracks[i].volume * globalVolume,

    onend: () => {
      if (currentTrack + 1 < tracks.length) playTrack(currentTrack + 1);
    }
  });

  sound.play();
  render();
}

function render() {

  const list = document.getElementById("playlist");
  list.innerHTML = "";

  tracks.forEach((t,i) => {
    const div = document.createElement("div");
    div.className = "track";
    if (i === currentTrack) div.classList.add("active");
    div.innerText = t.title;
    div.onclick = () => playTrack(i);
    list.appendChild(div);
  });
}

document.getElementById("activeControl").onclick = () => {
  if (!sound) return;
  sound.playing() ? sound.pause() : sound.play();
};

document.getElementById("volumeSlider").addEventListener("input",(e)=>{
  globalVolume = parseFloat(e.target.value);
  if (sound) sound.volume(tracks[currentTrack].volume * globalVolume);
});

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function typeUser(t){
  const el=document.getElementById("bootText");
  for(let i=0;i<=t.length;i++){
    el.innerText=t.slice(0,i);
    await sleep(56);
  }
}

async function boot(){
  await typeUser("SusanSurandin");
  await sleep(800);
  document.getElementById("bootText").innerText="INITIALIZING AUDIO SUBSYSTEM";
  await sleep(900);
  document.getElementById("bootText").innerText="WELCOME BACK SUSAN";
  await sleep(800);
  document.getElementById("boot").style.display="none";
  document.getElementById("wrapper").style.display="flex";
  render();
  playTrack(0);
}

document.getElementById("boot").addEventListener("pointerdown",()=>{
  if(bootLocked) return;
  bootLocked=true;
  boot();
});

</script>

</body>
</html>
