<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player v0.07b</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: white;
  overflow: hidden;
}

/* ---------------- BOOT ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#title {
  color: red;
  font-size: 32px;
  letter-spacing: 4px;
  margin-bottom: 40px;
}

.field {
  width: 260px;
  border-bottom: 1px solid #333;
  padding: 6px;
  font-size: 14px;
  min-height: 20px;
}

.label {
  opacity: 0.7;
  margin-top: 10px;
}

/* ---------------- PLAYER ---------------- */

.wrapper {
  max-width: 520px;
  margin: auto;
  margin-top: 60px;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
}

/* playlist */
.track {
  text-align: center;
  padding: 6px;
  opacity: 0.2;
  transition: 0.2s;
}

.track.active {
  opacity: 1;
  font-weight: bold;
  transform: scale(1.3);
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.5;
}

/* ---------------- TRIAGE LOGO ---------------- */

#logo {
  position: fixed;
  bottom: 10px;
  left: 12px;
  font-size: 14px;
  opacity: 0.7;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* triangle "A" */
.triangleA {
  width: 12px;
  height: 12px;
  background: red;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  display: inline-block;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  <div id="title">TRIAGE</div>

  <div class="label">Username</div>
  <div class="field" id="userField"></div>

  <div class="label">Password</div>
  <div class="field" id="passField"></div>
</div>

<!-- PLAYER -->
<div class="wrapper">
  <audio id="player" playsinline></audio>
  <div id="playlist"></div>
</div>

<!-- LOGO -->
<div id="logo">
  T R I <span class="triangleA"></span> G E
</div>

<!-- VERSION -->
<div id="version">
Last Functional Build: 0.07b<br>
Current Build: 0.07b
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

/* ---------------- TRACKS ---------------- */

const tracks = [
  { title: "Intro: Welcome (Back)", file: "Notes5.oga", type: "audio/ogg" },
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes.mp3", type: "audio/mp3" }
];

const audio = document.getElementById("player");
const player = new Plyr(audio);

let currentTrack = 0;

/* ---------------- AUDIO SYNC FIX ---------------- */

function playTrack(i) {

  currentTrack = i;

  player.source = {
    type: 'audio',
    sources: [{
      src: tracks[i].file,
      type: tracks[i].type
    }]
  };

  // HARD SYNC: wait for metadata before play
  audio.onloadedmetadata = () => {
    player.play().catch(()=>{});
  };
}

/* ---------------- BOOT SEQUENCE (SYNC FIXED) ---------------- */

function typeUser(el, text, cb) {

  let i = 0;

  const t = setInterval(() => {
    el.innerText = text.slice(0, i);
    i++;
    if (i > text.length) {
      clearInterval(t);
      cb?.();
    }
  }, 40);
}

async function typePassword(el, text, cb) {

  let out = "";

  for (let i = 0; i < text.length; i++) {

    out += text[i];
    el.innerText = out;

    await new Promise(r => setTimeout(r, 100));
    el.innerText = "*".repeat(out.length);
    await new Promise(r => setTimeout(r, 100));
  }

  cb?.();
}

function boot() {

  const u = document.getElementById("userField");
  const p = document.getElementById("passField");

  typeUser(u, "SusanSurandin", () => {

    typePassword(p, "WitnessMe", () => {

      // 🟢 PERFECT SYNC POINT
      document.getElementById("boot").style.display = "none";

      player.play().catch(()=>{});
      playTrack(0);

    });

  });
}

/* ---------------- INIT ---------------- */

window.addEventListener("click", boot, { once: true });

</script>

</body>
</html>
