<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>TRI▲GE</title>

<style>
body {
  margin: 0;
  background: #ffffff;
  color: #c00000;
  font-family: monospace;
  height: 100vh;
}

/* FULL SCREEN CLICK SURFACE */
#boot {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

#title {
  font-size: 48px;
  letter-spacing: 8px;
  display: flex;
  align-items: center;
}

.triangle {
  display: inline-block;
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-bottom: 24px solid #c00000;
  margin: 0 6px;
}

#bootVer {
  margin-top: 10px;
  font-size: 14px;
  color: #000000;
}

#state {
  margin-top: 20px;
}
</style>
</head>

<body>

<div id="boot">
  <div id="title">
    T R I <div class="triangle"></div> G E
  </div>

  <div id="bootVer">0.14g</div>
  <div id="state">CLICK ANYWHERE</div>
</div>

<audio id="loginSfx" src="Notes5.oga" preload="auto"></audio>

<script>
const boot = document.getElementById("boot");
const state = document.getElementById("state");
const sfx = document.getElementById("loginSfx");

boot.addEventListener("click", () => {
  state.innerText = "INITIALIZING...";
  sfx.currentTime = 0;
  sfx.play().catch(() => {});
});
</script>

</body>
</html>
