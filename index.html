<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player v0.04</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  padding: 40px;
  background: radial-gradient(circle at top, #1a1a1a, #0c0c0c);
  font-family: system-ui, sans-serif;
  color: white;
}

/* ---------------- WRAPPER ---------------- */

.wrapper {
  max-width: 520px;
  margin: auto;
  padding: 20px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
}

/* ---------------- PLAYLIST ---------------- */

#playlist {
  margin-top: 20px;
}

/* base */
.track {
  cursor: pointer;
  text-align: center;
  transition: all 0.35s ease;
  padding: 6px 0;
}

/* farthest */
.track.far {
  opacity: 0.15;
  transform: scale(0.75);
}

/* medium */
.track.near {
  opacity: 0.45;
  transform: scale(0.9);
}

/* adjacent */
.track.adjacent {
  opacity: 0.75;
  transform: scale(1.05);
}

/* active center */
.track.active {
  opacity: 1;
  transform: scale(1.35);
  font-weight: 700;
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.5;
  text-align: right;
}
</style>
</head>

<body>

<div class="wrapper">

<audio id="player" playsinline></audio>

<div id="playlist"></div>

</div>

<div id="version">
Last Functional Build: 0.03<br>
Current Build: 0.04
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

/* ---------------- TRACKS ---------------- */

const tracks = [
  { title: "Intro: Welcome (Back)", file: "Notes5.oga", type: "audio/ogg" },
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3", type: "audio/mp3" },

  { title: "Announcement 1", file: "Announcement1.oga", type: "audio/ogg" },
  { title: "Announcement 2", file: "Announcement2.oga", type: "audio/ogg" },
  { title: "Announcement 3", file: "Announcement3.oga", type: "audio/ogg" },
  { title: "Announcement 4", file: "Announcement4.oga", type: "audio/ogg" },
  { title: "Announcement 6", file: "Announcement6.oga", type: "audio/ogg" }
];

const audio = document.getElementById("player");
const playlistEl = document.getElementById("playlist");

let currentTrack = 0;

/* ---------------- PLYR ---------------- */

const player = new Plyr(audio, {
  controls: ['play', 'progress', 'current-time', 'mute', 'volume']
});

/* ---------------- PLAYLIST RENDER ---------------- */

function renderPlaylist() {
  playlistEl.innerHTML = "";

  tracks.forEach((t, i) => {

    const el = document.createElement("div");
    el.className = "track";
    el.innerText = t.title;

    const d = Math.abs(i - currentTrack);

    if (i === currentTrack) {
      el.classList.add("active");
    } 
    else if (d === 1) {
      el.classList.add("adjacent");
    } 
    else if (d === 2) {
      el.classList.add("near");
    } 
    else {
      el.classList.add("far");
    }

    el.onclick = () => playTrack(i);

    playlistEl.appendChild(el);
  });
}

/* ---------------- PLAY TRACK ---------------- */

function playTrack(i) {

  currentTrack = i;

  player.source = {
    type: 'audio',
    sources: [{
      src: tracks[i].file,
      type: tracks[i].type
    }]
  };

  renderPlaylist();

  const attempt = player.play();

  if (attempt !== undefined) {
    attempt.catch(() => {
      console.log("Autoplay blocked (expected in Notion)");
    });
  }
}

/* ---------------- AUTO FLOW ---------------- */

player.on("ended", () => {
  if (currentTrack + 1 < tracks.length) {
    playTrack(currentTrack + 1);
  }
});

/* ---------------- INIT ---------------- */

window.addEventListener("load", () => {
  renderPlaylist();
  playTrack(0);
});

</script>

</body>
</html>
