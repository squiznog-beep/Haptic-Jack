<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player</title>

<style>
body {
  margin: 0;
  padding: 40px;
  background: radial-gradient(circle at top, #1a1a1a, #0c0c0c);
  font-family: system-ui, sans-serif;
  color: white;
}

.wrapper {
  max-width: 520px;
  margin: auto;
  padding: 20px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
}

/* ---------------- PLAYLIST ---------------- */

#playlist {
  margin-top: 20px;
  max-height: 240px;
  overflow: hidden;
  position: relative;
}

.track {
  cursor: pointer;
  text-align: center;
  transition: all 0.35s ease;
  opacity: 0.25;
  transform: scale(0.8);
  padding: 6px 0;
}

.track.active {
  font-weight: 700;
  opacity: 1;
  transform: scale(1.25);
}

.track.near {
  opacity: 0.6;
  transform: scale(1);
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.5;
  line-height: 1.4;
  text-align: right;
}
</style>
</head>

<body>

<div class="wrapper">

<audio id="audio" controls></audio>

<div id="playlist"></div>

</div>

<div id="version">
Last Functional Build: 0.01<br>
Current Build: 0.02
</div>

<script>

const tracks = [
  { title: "Welcome (Back)", file: "Notes5.oga", volume: 0.70 },
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3", volume: 0.10 }
];

const audio = document.getElementById("audio");
const playlist = document.getElementById("playlist");

let currentTrack = 0;

/* ---------------- RENDER PLAYLIST WINDOW ---------------- */

function renderPlaylist(){

  playlist.innerHTML = "";

  for(let i = 0; i < tracks.length; i++){

    const el = document.createElement("div");
    el.className = "track";
    el.innerText = tracks[i].title;

    let distance = Math.abs(i - currentTrack);

    if(i === currentTrack){
      el.classList.add("active");
    } else if(distance === 1 || distance === 2){
      el.classList.add("near");
    } else {
      el.style.display = "none";
    }

    el.onclick = () => playTrack(i);

    playlist.appendChild(el);
  }
}

/* ---------------- VOLUME ---------------- */

function setVolume(v){
  audio.volume = v;
}

/* ---------------- PLAY ---------------- */

function playTrack(i){

  currentTrack = i;
  audio.src = tracks[i].file;

  audio.muted = true;

  audio.play().then(() => {

    setTimeout(() => {
      audio.muted = false;
      setVolume(tracks[i].volume);
    }, 120);

  });

  renderPlaylist();
}

/* ---------------- AUTO FLOW ---------------- */

audio.addEventListener("ended", () => {

  if(currentTrack === 0){
    playTrack(1);
  }

});

/* ---------------- SCROLL CONTROL ---------------- */

playlist.addEventListener("wheel", (e) => {

  if(e.deltaY > 0){
    currentTrack = Math.min(currentTrack + 1, tracks.length - 1);
  } else {
    currentTrack = Math.max(currentTrack - 1, 0);
  }

  renderPlaylist();
});

/* ---------------- INIT ---------------- */

window.addEventListener("load", () => {
  playTrack(0);
});

</script>

</body>
</html>
