<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player v0.07e</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: white;
  overflow: hidden;
}

/* ---------------- BOOT ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#title {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 32px;
  color: red;
  letter-spacing: 4px;
  margin-bottom: 30px;
}

/* TRIANGLE (single source of truth) */
.triangle {
  width: 14px;
  height: 14px;
  background: red;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  display: inline-block;
}

.field {
  width: 260px;
  border-bottom: 1px solid #333;
  padding: 6px;
  font-size: 14px;
  min-height: 20px;
}

.label {
  opacity: 0.7;
  margin-top: 10px;
}

#bootText {
  margin-top: 25px;
  opacity: 0;
}

/* ---------------- PLAYER ---------------- */

.wrapper {
  max-width: 520px;
  margin: auto;
  margin-top: 60px;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
}

/* playlist */
.track {
  text-align: center;
  padding: 6px;
  opacity: 0.25;
  transition: 0.2s;
}

.track.active {
  opacity: 1;
  font-weight: bold;
  transform: scale(1.3);
}

/* ---------------- LOGO ---------------- */

#logo {
  position: fixed;
  bottom: 10px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  opacity: 0.7;
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  <div id="title">
    T R I <span class="triangle"></span> G E
  </div>

  <div class="label">Username</div>
  <div class="field" id="userField"></div>

  <div class="label">Password</div>
  <div class="field" id="passField"></div>

  <div id="bootText">INITIALIZING...</div>
</div>

<!-- PLAYER -->
<div class="wrapper">
  <audio id="player" playsinline></audio>
  <div id="playlist"></div>
</div>

<!-- LOGO -->
<div id="logo">
  T R I <span class="triangle"></span> G E
</div>

<div id="version">
Last Functional Build: 0.07d<br>
Current Build: 0.07e
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

const tracks = [
  { title: "Intro: Welcome (Back)", file: "Notes5.oga", type: "audio/ogg" },
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes.mp3", type: "audio/mp3" },
  { title: "Announcement 1", file: "Announcement1.oga", type: "audio/ogg" },
  { title: "Announcement 2", file: "Announcement2.oga", type: "audio/ogg" },
  { title: "Announcement 3", file: "Announcement3.oga", type: "audio/ogg" },
  { title: "Announcement 4", file: "Announcement4.oga", type: "audio/ogg" },
  { title: "Announcement 6", file: "Announcement6.oga", type: "audio/ogg" }
];

const audio = document.getElementById("player");
const player = new Plyr(audio);

let currentTrack = 0;

/* ---------------- PROLOGUE FIX (HARD RESET LOAD) ---------------- */

function playTrack(i) {
  currentTrack = i;

  audio.pause();
  audio.src = tracks[i].file;
  audio.load();

  player.source = {
    type: 'audio',
    sources: [{
      src: tracks[i].file,
      type: tracks[i].type
    }]
  };

  player.once("loadeddata", () => {
    player.play().catch(()=>{});
  });

  renderPlaylist();
}

/* ---------------- PLAYLIST ---------------- */

const playlistEl = document.getElementById("playlist");

function renderPlaylist() {
  playlistEl.innerHTML = "";

  const start = Math.max(0, currentTrack - 2);
  const end = Math.min(tracks.length - 1, currentTrack + 2);

  for (let i = start; i <= end; i++) {
    const el = document.createElement("div");
    el.className = "track";

    if (i === currentTrack) el.classList.add("active");

    el.innerText = tracks[i].title;
    el.onclick = () => playTrack(i);

    playlistEl.appendChild(el);
  }
}

/* ---------------- PASSWORD (FIXED ORDER) ---------------- */

async function typePassword(el, text) {
  let out = "";

  for (let i = 0; i < text.length; i++) {

    out += text[i];

    el.innerText = out;                 // LETTER FIRST
    await new Promise(r => setTimeout(r, 100));

    el.innerText = "*".repeat(out.length); // THEN MASK
    await new Promise(r => setTimeout(r, 100));
  }
}

/* ---------------- USER TYPE ---------------- */

function typeUser(el, text, cb) {
  let i = 0;

  const t = setInterval(() => {
    el.innerText = text.slice(0, i++);
    if (i > text.length) {
      clearInterval(t);
      cb?.();
    }
  }, 40);
}

/* ---------------- BOOT (FIXED SYNC) ---------------- */

function boot() {

  const u = document.getElementById("userField");
  const p = document.getElementById("passField");
  const bootText = document.getElementById("bootText");

  typeUser(u, "SusanSurandin", () => {

    typePassword(p, "WitnessMe").then(() => {

      // FIX: show text immediately
      bootText.style.opacity = 1;
      bootText.innerText = "WELCOME BACK SUSAN";

      // FIX: slight audio lead-in compensation
      setTimeout(() => {
        playTrack(0);
      }, 200);

      setTimeout(() => {
        document.getElementById("boot").style.display = "none";
      }, 1200);

    });

  });
}

window.addEventListener("click", boot, { once: true });

window.addEventListener("load", renderPlaylist);

</script>

</body>
</html>
