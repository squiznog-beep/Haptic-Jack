<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>0.14g – Howler Volume Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

<style>
  body {
    margin: 0;
    background: #0b0b0b;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .player {
    text-align: center;
    width: 320px;
  }

  button {
    width: 120px;
    padding: 10px;
    font-size: 16px;
    margin-bottom: 25px;
    cursor: pointer;
  }

  input[type="range"] {
    width: 100%;
  }

  label {
    display: block;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<div class="player">
  <h2>Prologue</h2>

  <button id="playBtn">Play</button>

  <label>Volume</label>
  <input id="volumeSlider"
         type="range"
         min="0"
         max="1"
         step="0.01"
         value="1">
</div>

<script>
  // Uses WebAudio (NOT html5 fallback)
  const prologue = new Howl({
    src: ['Prologue.mp3'], 
    html5: false,
    volume: 1
  });

  const playBtn = document.getElementById('playBtn');
  const volumeSlider = document.getElementById('volumeSlider');

  let playing = false;

  playBtn.addEventListener('click', () => {
    if (!playing) {
      prologue.play();
      playBtn.textContent = 'Pause';
      playing = true;
    } else {
      prologue.pause();
      playBtn.textContent = 'Play';
      playing = false;
    }
  });

  volumeSlider.addEventListener('input', (e) => {
    const value = parseFloat(e.target.value);
    prologue.volume(value);
  });
</script>

</body>
</html>
