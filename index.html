<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player v0.07c</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: white;
  overflow: hidden;
}

/* ---------------- BOOT ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* TRIAGE TITLE */
#title {
  color: red;
  font-size: 32px;
  letter-spacing: 4px;
  margin-bottom: 30px;
}

/* fields */
.field {
  width: 260px;
  border-bottom: 1px solid #333;
  padding: 6px;
  font-size: 14px;
  min-height: 20px;
}

.label {
  opacity: 0.7;
  margin-top: 10px;
}

/* boot message */
#bootText {
  margin-top: 30px;
  opacity: 0;
  transition: opacity 0.5s ease;
}

/* ---------------- PLAYER ---------------- */

.wrapper {
  max-width: 520px;
  margin: auto;
  margin-top: 60px;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
}

/* playlist */
.track {
  text-align: center;
  padding: 6px;
  opacity: 0.3;
  cursor: pointer;
  transition: 0.2s;
}

.track.active {
  opacity: 1;
  font-weight: bold;
  transform: scale(1.3);
}

/* ---------------- LOGO ---------------- */

#logo {
  position: fixed;
  bottom: 10px;
  left: 12px;
  font-size: 14px;
  opacity: 0.7;
  display: flex;
  gap: 4px;
  align-items: center;
}

.triangleA {
  width: 12px;
  height: 12px;
  background: red;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  <div id="title">TRI✦GE</div>

  <div class="label">Username</div>
  <div class="field" id="userField"></div>

  <div class="label">Password</div>
  <div class="field" id="passField"></div>

  <div id="bootText">INITIALIZING...</div>
</div>

<!-- PLAYER -->
<div class="wrapper">
  <audio id="player" playsinline></audio>
  <div id="playlist"></div>
</div>

<!-- LOGO -->
<div id="logo">
  T R I <span class="triangleA"></span> G E
</div>

<!-- VERSION -->
<div id="version">
Last Functional Build: 0.07b<br>
Current Build: 0.07c
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

/* ---------------- TRACKS ---------------- */

const tracks = [
  { title: "Intro: Welcome (Back)", file: "Notes5.oga", type: "audio/ogg" },
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes.mp3", type: "audio/mp3" },
  { title: "Announcement 1", file: "Announcement1.oga", type: "audio/ogg" },
  { title: "Announcement 2", file: "Announcement2.oga", type: "audio/ogg" },
  { title: "Announcement 3", file: "Announcement3.oga", type: "audio/ogg" },
  { title: "Announcement 4", file: "Announcement4.oga", type: "audio/ogg" },
  { title: "Announcement 6", file: "Announcement6.oga", type: "audio/ogg" }
];

const audio = document.getElementById("player");
const player = new Plyr(audio);

let currentTrack = 0;

/* ---------------- PLAYLIST ---------------- */

const playlistEl = document.getElementById("playlist");

function renderPlaylist() {
  playlistEl.innerHTML = "";

  tracks.forEach((t, i) => {
    const el = document.createElement("div");
    el.className = "track";
    el.innerText = t.title;

    if (i === currentTrack) el.classList.add("active");

    el.onclick = () => playTrack(i);
    playlistEl.appendChild(el);
  });
}

/* ---------------- TRACK PLAY ---------------- */

function playTrack(i) {
  currentTrack = i;

  player.source = {
    type: 'audio',
    sources: [{
      src: tracks[i].file,
      type: tracks[i].type
    }]
  };

  renderPlaylist();

  player.play().catch(()=>{});
}

/* ---------------- AUTO NEXT ---------------- */

player.on("ended", () => {
  if (currentTrack + 1 < tracks.length) {
    playTrack(currentTrack + 1);
  }
});

/* ---------------- BOOT SEQUENCE ---------------- */

function typeText(el, text, speed, cb) {
  let i = 0;
  const t = setInterval(() => {
    el.innerText = text.slice(0, i++);
    if (i > text.length) {
      clearInterval(t);
      cb?.();
    }
  }, speed);
}

async function typePassword(el, text, cb) {

  let out = "";

  for (let i = 0; i < text.length; i++) {

    out += text[i];
    el.innerText = out;

    await new Promise(r => setTimeout(r, 100));
    el.innerText = "*".repeat(out.length);
    await new Promise(r => setTimeout(r, 100));
  }

  cb?.();
}

function boot() {

  const u = document.getElementById("userField");
  const p = document.getElementById("passField");
  const bootText = document.getElementById("bootText");

  typeText(u, "SusanSurandin", 40, () => {

    typePassword(p, "WitnessMe", async () => {

      // RESTORED MISSING STEP
      bootText.style.opacity = 1;
      bootText.innerText = "WELCOME BACK SUSAN";

      await new Promise(r => setTimeout(r, 1200));

      document.getElementById("boot").style.display = "none";

      playTrack(0);

    });

  });
}

/* ---------------- INIT ---------------- */

window.addEventListener("click", boot, { once: true });

window.addEventListener("load", renderPlaylist);

</script>

</body>
</html>
