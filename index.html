<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>TRI▲GE v0.16.5</title>

<style>

/* ---------------- BASE ---------------- */

body {
  margin: 0;
  background: white;
  color: black;
  font-family: monospace;
  overflow: hidden;
}

/* ---------------- BOOT ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: white;
  z-index: 9999;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  cursor: pointer;
  transition: opacity 0.6s ease;
}

/* FIXED HEADER CENTERING */
#title {
  display: flex;
  align-items: center;
  justify-content: center;
  position: absolute;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  letter-spacing: 7px;

  color: #c00000;
  font-size: 40px;
}

#title span {
  margin-right: 16px;
}

#title span:nth-child(3) {
  margin-right: 8px;
}

/* TRIANGLE */
.triangle {
  width: 0;
  height: 0;

  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-bottom: 24px solid #c00000;

  margin-left: 10px;
  margin-right: 18px;
}

#bootVer {
  margin-top: 10px;
  font-size: 13px;
}

.field {
  width: 260px;
  border-bottom: 1px solid #ddd;
  padding: 6px;
  margin-top: 14px;
  min-height: 18px;
}

/* WAKE UP TEXT */
#bootText {
  margin-top: 28px;
  color: #4a90ff;
  opacity: 0;
  animation: pulse 5s ease-in-out infinite;
}

@keyframes pulse {
  0% { opacity: 0; }
  25% { opacity: 0.85; }
  55% { opacity: 0.85; }
  100% { opacity: 0; }
}

/* ---------------- PLAYER ---------------- */

#wrapper {
  height: 100vh;
  display: none;
  justify-content: center;
  align-items: center;
}

/* floating play triangle (ONLY ONE, FIXED) */
#floatingPlay {
  position: absolute;
  left: calc(50% - 260px - 140px);
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

.playTriangle {
  width: 0;
  height: 0;

  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-bottom: 30px solid #c00000;

  transform-origin: 50% 60%;
}

.playTriangle.spinning {
  animation: smoothSpin 4s linear infinite;
}

@keyframes smoothSpin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

#panel {
  width: 520px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ---------------- PLAYLIST ---------------- */

#playlist {
  height: 180px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
  font-size: 16px;
}

.track {
  padding: 6px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.track.active {
  color: #c00000;
  font-weight: bold;
  transform: scale(1.25);
}

.track.near { opacity: 0.55; }
.track.far { opacity: 0.2; transform: scale(0.88); }

/* ---------------- PROGRESS ---------------- */

#progressContainer {
  width: 100%;
  height: 6px;
  background: #eee;
  cursor: pointer;
}

#progressBar {
  width: 0%;
  height: 100%;
  background: #c00000;
}

/* ---------------- VOLUME ---------------- */

#volumeWrap {
  margin-top: 18px;
}

input[type=range] {
  width: 220px;
  accent-color: #c00000;
}

/* ---------------- CORNER LOGO ---------------- */

#cornerLogo {
  position: fixed;
  bottom: 10px;
  left: 12px;
  display: flex;
  align-items: center;
  color: #c00000;
  opacity: 0.75;
  letter-spacing: 4px;
}

.smallTri {
  transform: scale(0.6);
  margin-left: 4px;
  margin-right: 10px;
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.6;
}

</style>
</head>

<body>

<div id="boot">

  <div id="title">
    <span>T</span><span>R</span><span>I</span>
    <div class="triangle"></div>
    <span>G</span><span>E</span>
  </div>

  <div id="bootVer">v0.16.5</div>

  <div class="field" id="userField"></div>
  <div class="field" id="passField"></div>

  <div id="bootText">Wake up -U</div>
</div>

<div id="wrapper">

  <div id="floatingPlay" class="playTriangle"></div>

  <div id="panel">
    <div id="playlist"></div>

    <div id="progressContainer">
      <div id="progressBar"></div>
    </div>

    <div id="volumeWrap">
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
    </div>
  </div>
</div>

<div id="cornerLogo">
  T R I <div class="triangle smallTri"></div> G E
</div>

<div id="version">
Last Functional Build: N/A<br>
Current Build: 0.16.5
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

<script>

/* ---------------- TRACK DATA ---------------- */

const tracks = [
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3", volume: 0.10 },
  { title: "Announcement 1", file: "Announcement1.oga", volume: 0.60 },
  { title: "Control Yourself", file: "Edith Margaret Mudge - Triangle Agency - 01 Control Yourself.flac", volume: 0.05 },
  { title: "Stability", file: "Edith Margaret Mudge - Stability - Expansion Pack - 01 Stability - Loopable Extension.mp3", volume: 0.05 },
  { title: "Announcement 2", file: "Announcement2.oga", volume: 0.60 },
  { title: "Announcement 3", file: "Announcement3.oga", volume: 0.60 },
  { title: "Announcement 4", file: "Announcement4.oga", volume: 0.60 },
  { title: "Announcement 6", file: "Announcement6.oga", volume: 0.60 }
];

let currentTrack = 0;
let sound = null;
let globalVolume = 1;

/* ---------------- ELEMENTS ---------------- */

const wrapper = document.getElementById("wrapper");
const playlist = document.getElementById("playlist");
const progressBar = document.getElementById("progressBar");
const progressContainer = document.getElementById("progressContainer");
const volumeSlider = document.getElementById("volumeSlider");
const floatingPlay = document.getElementById("floatingPlay");

/* ---------------- AUDIO ---------------- */

function playTrack(i) {

  currentTrack = i;

  if (sound) sound.unload();

  sound = new Howl({
    src: [tracks[i].file],
    html5: true,
    volume: tracks[i].volume * globalVolume,

    onend: () => {
      if (currentTrack + 1 < tracks.length) playTrack(currentTrack + 1);
    }
  });

  sound.play();
  renderPlaylist();
  updateFloating();
}

/* FIXED: real toggle */
floatingPlay.addEventListener("click", () => {
  if (!sound) return;
  sound.playing() ? sound.pause() : sound.play();
  updateFloating();
});

function updateFloating() {
  floatingPlay.classList.toggle("spinning", sound && sound.playing());
}

/* ---------------- PLAYLIST ---------------- */

function renderPlaylist() {

  playlist.innerHTML = "";

  for (let i = 0; i < tracks.length; i++) {

    const distance = i - currentTrack;
    if (Math.abs(distance) > 2) continue;

    const div = document.createElement("div");
    div.classList.add("track");

    if (distance === 0) div.classList.add("active");
    else if (Math.abs(distance) === 1) div.classList.add("near");
    else div.classList.add("far");

    div.textContent = tracks[i].title;
    div.onclick = () => playTrack(i);

    playlist.appendChild(div);
  }
}

/* ---------------- PROGRESS ---------------- */

function updateProgress() {

  if (sound) {
    const seek = sound.seek() || 0;
    const dur = sound.duration() || 1;
    progressBar.style.width = (seek / dur) * 100 + "%";
  }

  requestAnimationFrame(updateProgress);
}

/* ---------------- VOLUME FIX (iOS LIVE) ---------------- */

volumeSlider.addEventListener("input", (e) => {

  globalVolume = parseFloat(e.target.value);

  if (!sound) return;

  const v = tracks[currentTrack].volume * globalVolume;
  sound.volume(v);

  const node = sound._sounds?.[0]?._node;
  if (node) node.volume = v;
});

/* ---------------- TYPE (FIXED TIMING) ---------------- */

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

async function typeUser(text) {
  const el = document.getElementById("userField");
  for (let i = 0; i <= text.length; i++) {
    el.textContent = text.slice(0, i);
    await sleep(56); // +40%
  }
}

async function typePassword(text) {
  const el = document.getElementById("passField");

  let masked = "";
  for (let i = 0; i < text.length; i++) {

    el.textContent = masked + text[i];
    await sleep(72); // +80%
    masked += "*";
    el.textContent = masked;
    await sleep(72);
  }
}

/* ---------------- BOOT ---------------- */

async function bootSequence() {

  const boot = document.getElementById("boot");
  const bootText = document.getElementById("bootText");

  await sleep(300);

  await typeUser("SusanSurandin");

  await sleep(900); // intentional pause

  await typePassword("WitnessMe");

  await sleep(500);

  bootText.textContent = "WELCOME BACK SUSAN";

  await sleep(800);

  boot.style.opacity = 0;
  await sleep(600);

  boot.style.display = "none";
  wrapper.style.display = "flex";

  renderPlaylist();
  playTrack(0);
  updateProgress();
}

/* ---------------- START ---------------- */

let started = false;

document.getElementById("boot").addEventListener("pointerdown", async () => {

  if (started) return;
  started = true;

  try { await Howler.ctx.resume(); } catch(e) {}

  bootSequence();
});

updateProgress();

</script>

</body>
</html>
