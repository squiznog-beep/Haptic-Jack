<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player v0.09d</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: white;
  overflow: hidden;
}

/* ---------------- OUTER LAYOUT ---------------- */

#stage {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  gap: 20px;
}

/* ---------------- PLAYER WINDOW ---------------- */

.wrapper {
  width: 520px;
  padding: 16px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  backdrop-filter: blur(20px);
}

/* ---------------- BOOT ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#title {
  font-size: 32px;
  color: red;
  letter-spacing: 4px;
  margin-bottom: 40px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.triangle {
  width: 0.9em;
  height: 0.9em;
  background: red;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  position: relative;
  top: 2px;
}

.label {
  opacity: 0.7;
  margin-bottom: 4px;
}

.field {
  width: 260px;
  border-bottom: 1px solid #333;
  padding: 6px;
  font-size: 14px;
  min-height: 20px;
  margin-bottom: 15px;
}

/* ---------------- PLAYLIST ---------------- */

#playlist {
  margin-top: 15px;
  text-align: center;
}

.track {
  padding: 6px;
  transition: all 0.25s ease;
  opacity: 0.3;
}

.track.active {
  font-weight: bold;
  opacity: 1;
  transform: scale(1.25);
}

.track.near {
  opacity: 0.6;
}

/* ---------------- LOGO + VERSION ---------------- */

#logo {
  position: fixed;
  bottom: 10px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  opacity: 0.7;
  color: red;
}

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.5;
}

/* ---------------- VOLUME LOCK ---------------- */

#volumeLock {
  margin-top: 10px;
  font-size: 12px;
  padding: 6px 10px;
  background: rgba(255,0,0,0.15);
  border: 1px solid rgba(255,0,0,0.4);
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

#volumeLock.locked {
  background: rgba(255,0,0,0.45);
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  <div id="title">
    T R I <div class="triangle"></div> G E
  </div>

  <div class="label">Username</div>
  <div class="field" id="userField"></div>

  <div class="label">Password</div>
  <div class="field" id="passField"></div>
</div>

<!-- MAIN STAGE -->
<div id="stage">

  <div class="wrapper">
    <audio id="player" playsinline></audio>

    <button id="volumeLock">Volume: UNLOCKED</button>

    <div id="playlist"></div>
  </div>

</div>

<div id="logo">
  T R I <div class="triangle"></div> G E
</div>

<div id="version">
Last Functional Build: 0.09c<br>
Current Build: 0.09d
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

/* ---------------- TRACKS ---------------- */

const tracks = [
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3" },
  { title: "Announcement 1", file: "Announcement1.oga" },
  { title: "Announcement 2", file: "Announcement2.oga" },
  { title: "Announcement 3", file: "Announcement3.oga" },
  { title: "Announcement 4", file: "Announcement4.oga" },
  { title: "Announcement 6", file: "Announcement6.oga" }
];

const audio = document.getElementById("player");

const player = new Plyr(audio, {
  controls: [
    'play',
    'progress',
    'current-time',
    'mute',
    'volume'   // THIS is your real slider
  ]
});

let currentTrack = 0;

/* ---------------- VOLUME SYSTEM ---------------- */

let volumeLocked = false;

/* lock prevents slider changes */
function enforceLock() {
  if (!volumeLocked) return;
  player.volume = player.volume;
}

/* ---------------- LOCK BUTTON ---------------- */

const lockBtn = document.getElementById("volumeLock");

lockBtn.addEventListener("click", () => {
  volumeLocked = !volumeLocked;

  lockBtn.textContent = volumeLocked
    ? "Volume: LOCKED"
    : "Volume: UNLOCKED";

  lockBtn.classList.toggle("locked", volumeLocked);
});

/* ---------------- PLAY TRACK ---------------- */

function playTrack(i) {
  currentTrack = i;

  player.source = {
    type: 'audio',
    sources: [{
      src: tracks[i].file,
      type: 'audio/mp3'
    }]
  };

  renderPlaylist();

  player.play().catch(()=>{});
}

/* ---------------- PLAYLIST (5 WINDOW) ---------------- */

function renderPlaylist() {
  const el = document.getElementById("playlist");
  el.innerHTML = "";

  const start = Math.max(0, currentTrack - 2);
  const end = Math.min(tracks.length - 1, currentTrack + 2);

  for (let i = start; i <= end; i++) {

    const div = document.createElement("div");
    div.className = "track";

    if (i === currentTrack) div.classList.add("active");
    else div.classList.add("near");

    div.textContent = tracks[i].title;
    div.onclick = () => playTrack(i);

    el.appendChild(div);
  }
}

/* ---------------- BOOT (simplified stable) ---------------- */

function type(el, text, speed, cb) {
  let i = 0;
  const t = setInterval(() => {
    el.textContent = text.slice(0, i++);
    if (i > text.length) {
      clearInterval(t);
      cb?.();
    }
  }, speed);
}

function startBoot() {

  const u = document.getElementById("userField");
  const p = document.getElementById("passField");

  type(u, "SusanSurandin", 40, () => {
    type(p, "WitnessMe", 60, () => {

      document.getElementById("boot").style.display = "none";
      playTrack(0);

    });
  });
}

/* ---------------- INIT ---------------- */

window.addEventListener("click", startBoot, { once: true });
window.addEventListener("load", renderPlaylist);

</script>

</body>
</html>
