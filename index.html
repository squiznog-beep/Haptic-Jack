<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player v0.07f</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: white;
  overflow: hidden;
}

/* ---------------- BOOT ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* TRIAGE FIXED GLYPH SYSTEM */
#title {
  color: red;
  font-size: 32px;
  letter-spacing: 4px;
  margin-bottom: 30px;
  display: flex;
  align-items: center;
}

.triangle {
  width: 0.9em;
  height: 0.9em;
  background: red;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  margin: 0 6px;
  display: inline-block;
  transform: translateY(0.05em);
}

.field {
  width: 260px;
  border-bottom: 1px solid #333;
  padding: 6px;
  font-size: 14px;
  min-height: 20px;
}

.label {
  opacity: 0.7;
  margin-top: 10px;
}

#bootText {
  margin-top: 25px;
  opacity: 0;
}

/* ---------------- PLAYER ---------------- */

.wrapper {
  max-width: 520px;
  margin: auto;
  margin-top: 60px;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
}

/* playlist window */
#playlist {
  margin-top: 20px;
  text-align: center;
}

.track {
  opacity: 0.25;
  transform: scale(0.8);
  transition: 0.2s;
  padding: 4px;
}

.track.active {
  opacity: 1;
  font-weight: bold;
  transform: scale(1.35);
}

/* ---------------- LOGO ---------------- */

#logo {
  position: fixed;
  bottom: 10px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  opacity: 0.7;
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  <div id="title">
    T R I <span class="triangle"></span> G E
  </div>

  <div class="label">Username</div>
  <div class="field" id="userField"></div>

  <div class="label">Password</div>
  <div class="field" id="passField"></div>

  <div id="bootText">INITIALIZING...</div>
</div>

<!-- PLAYER -->
<div class="wrapper">
  <audio id="player" playsinline></audio>
  <div id="playlist"></div>
</div>

<!-- LOGO -->
<div id="logo">
  T R I <span class="triangle"></span> G E
</div>

<div id="version">
Last Functional Build: 0.07f<br>
Current Build: 0.07f-fixed
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

const tracks = [
  { title: "Intro: Welcome (Back)", file: "Notes5.oga", type: "audio/ogg" },
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes.mp3", type: "audio/mp3" },
  { title: "Announcement 1", file: "Announcement1.oga", type: "audio/ogg" },
  { title: "Announcement 2", file: "Announcement2.oga", type: "audio/ogg" },
  { title: "Announcement 3", file: "Announcement3.oga", type: "audio/ogg" },
  { title: "Announcement 4", file: "Announcement4.oga", type: "audio/ogg" },
  { title: "Announcement 6", file: "Announcement6.oga", type: "audio/ogg" }
];

const audio = document.getElementById("player");
const player = new Plyr(audio);

let currentTrack = 0;

/* ---------------- PLAY TRACK (PLYR ONLY FIX) ---------------- */

function playTrack(i) {
  currentTrack = i;

  player.source = {
    type: 'audio',
    sources: [{
      src: tracks[i].file,
      type: tracks[i].type
    }]
  };

  player.play().catch(() => {});

  renderPlaylist();
}

/* ---------------- PLAYLIST ---------------- */

const playlistEl = document.getElementById("playlist");

function renderPlaylist() {
  playlistEl.innerHTML = "";

  const start = Math.max(0, currentTrack - 2);
  const end = Math.min(tracks.length - 1, currentTrack + 2);

  for (let i = start; i <= end; i++) {
    const el = document.createElement("div");
    el.className = "track";

    if (i === currentTrack) el.classList.add("active");

    el.innerText = tracks[i].title;
    el.onclick = () => playTrack(i);

    playlistEl.appendChild(el);
  }
}

/* ---------------- BOOT FIXED (RELIABLE CLICK + 1500ms) ---------------- */

function boot() {

  const startTime = performance.now();

  const u = document.getElementById("userField");
  const p = document.getElementById("passField");
  const bootText = document.getElementById("bootText");

  u.innerText = "SusanSurandin";

  let pw = "WitnessMe";
  p.innerText = "*".repeat(pw.length);

  const delay = 1500;

  setTimeout(() => {
    document.getElementById("boot").style.display = "none";
    playTrack(0);
  }, delay);
}

/* FIX: bulletproof click handling */
function bootOnce() {
  document.removeEventListener("click", bootOnce);
  boot();
}

document.addEventListener("click", bootOnce);
document.getElementById("boot").addEventListener("click", bootOnce);

window.addEventListener("load", renderPlaylist);

</script>

</body>
</html>
