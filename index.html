<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player v0.14e</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>

/* ---------------- PLYR THEME FIX (unchanged visually; irrelevant now but preserved) ---------------- */

:root {
  --plyr-color-main: #b30000;
  --plyr-audio-controls-background: rgba(20, 20, 20, 0.92);
  --plyr-control-icon-size: 16px;
}

body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: white;
  overflow: hidden;
}

/* ---------------- BOOT (UNCHANGED - DO NOT TOUCH CONTRACT) ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#bootVer {
  font-size: 30px;
  opacity: 0.5;
  margin-left: 12px;
  position: relative;
  top: 6px;
  color: white;
}

#title {
  font-size: 32px;
  color: red;
  letter-spacing: 4px;
  margin-bottom: 40px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.triangle {
  width: 0.9em;
  height: 0.9em;
  background: red;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  position: relative;
  top: 2px;
}

.label {
  opacity: 0.7;
  margin-bottom: 4px;
}

.field {
  width: 260px;
  border-bottom: 1px solid #333;
  padding: 6px;
  font-size: 14px;
  min-height: 20px;
  margin-bottom: 15px;
}

#bootText {
  margin-top: 30px;
  font-size: 18px;
  opacity: 0;
  transition: opacity 0.5s ease;
}

/* ---------------- PLAYER ---------------- */

.wrapper {
  max-width: 520px;
  margin: auto;
  padding: 20px;
  margin-top: 60px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  backdrop-filter: blur(20px);
}

#playlist {
  margin-top: 20px;
  text-align: center;
}

.track {
  padding: 6px;
  transition: all 0.25s ease;
}

.track.active {
  font-weight: bold;
  opacity: 1;
  transform: scale(1.3);
}

.track.near {
  opacity: 0.5;
  transform: scale(1);
}

.track.far {
  opacity: 0.15;
  transform: scale(0.85);
}

#logo {
  position: fixed;
  bottom: 10px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  opacity: 0.7;
  color: red;
}

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.5;
}

</style>
</head>

<body>

<!-- BOOT (UNCHANGED) -->
<div id="boot">
  <div id="title">
    T R I <div class="triangle"></div> G E
    <span id="bootVer">0.13f</span>
  </div>

  <div class="label">Username</div>
  <div class="field" id="userField"></div>

  <div class="label">Password</div>
  <div class="field" id="passField"></div>

  <div id="bootText">INITIALIZING...</div>
</div>

<!-- PLAYER -->
<div class="wrapper">
  <div id="playlist"></div>
</div>

<div id="logo">
  T R I <div class="triangle"></div> G E
</div>

<div id="version">
Last Functional Build: 0.12<br>
Current Build: 0.14e
</div>

<audio id="loginSfx" src="Notes5.oga" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/amplitudejs@5.3.2/dist/amplitude.min.js"></script>

<script>

/* ---------------- TRACKS (UNCHANGED STRUCTURE) ---------------- */

const tracks = [
  { name: "Prologue", url: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3", volume: 0.1 },
  { name: "Announcement 1", url: "Announcement1.oga", volume: 0.6 },
  { name: "Control Yourself", url: "Edith Margaret Mudge - Triangle Agency - 01 Control Yourself.flac", volume: 0.05 },
  { name: "Stability", url: "Edith Margaret Mudge - Stability - Expansion Pack - 01 Stability - Loopable Extension.mp3", volume: 0.05 },
  { name: "Announcement 2", url: "Announcement2.oga", volume: 0.6 },
  { name: "Announcement 3", url: "Announcement3.oga", volume: 0.6 },
  { name: "Announcement 4", url: "Announcement4.oga", volume: 0.6 },
  { name: "Announcement 6", url: "Announcement6.oga", volume: 0.6 }
];

/* ---------------- STATE ---------------- */

let initialized = false;

/* ---------------- BOOT SYSTEM (UNCHANGED) ---------------- */

function startBoot() {

  const loginSfx = document.getElementById("loginSfx");
  loginSfx.play().catch(()=>{});

  typeUser("userField", "SusanSurandin", () => {

    typePassword("passField", "WitnessMe", () => {

      const bootText = document.getElementById("bootText");
      bootText.style.opacity = 1;
      bootText.innerText = "WELCOME BACK SUSAN";

      setTimeout(() => {
        document.getElementById("boot").style.display = "none";
        initAmplitude();
      }, 1200);

    });

  });
}

/* ---------------- AMPLITUDE LAYER ONLY ---------------- */

function initAmplitude() {

  if (initialized) return;

  Amplitude.init({
    songs: tracks,
    volume: 0.5
  });

  initialized = true;

  renderPlaylist();

  setTimeout(() => {
    Amplitude.playSongAtIndex(0);
  }, 250);
}

/* ---------------- PLAYLIST (Amplitude-controlled UI) ---------------- */

function renderPlaylist() {

  const el = document.getElementById("playlist");
  el.innerHTML = "";

  tracks.forEach((t, i) => {

    const div = document.createElement("div");
    div.className = "track";
    div.innerText = t.name;

    div.onclick = () => {
      if (!initialized) return;
      Amplitude.playSongAtIndex(i);
    };

    el.appendChild(div);
  });
}

/* highlight active track */
setInterval(() => {

  if (!initialized) return;

  const idx = Amplitude.getActiveIndex();

  document.querySelectorAll(".track").forEach((t, i) => {
    t.classList.toggle("active", i === idx);
  });

}, 200);

/* ---------------- TYPE EFFECTS (UNCHANGED) ---------------- */

function typeUser(id, text, cb) {

  const el = document.getElementById(id);
  let i = 0;

  function step() {
    if (i <= text.length) {
      el.innerText = text.slice(0, i);
      i++;
      setTimeout(step, 40);
    } else cb();
  }

  step();
}

function typePassword(id, text, cb) {

  const el = document.getElementById(id);
  let masked = "";
  let i = 0;

  function step() {
    if (i < text.length) {
      masked += "*";
      el.innerText = masked;
      i++;
      setTimeout(step, 90);
    } else cb();
  }

  step();
}

/* ---------------- EVENTS ---------------- */

window.addEventListener("click", startBoot, { once: true });

window.addEventListener("load", () => {
  // DO NOT INIT AUDIO HERE (important fix)
});

</script>

</body>
</html>
