<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>TRI▲GE v0.16.5</title>

<style>

/* ---------------- BASE ---------------- */

body {
  margin: 0;
  background: white;
  color: black;
  font-family: monospace;
  overflow: hidden;
}

/* ---------------- BOOT ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: white;
  z-index: 9999;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  cursor: pointer;
  transition: opacity 0.6s ease;
}

/* FIXED HEADER CENTERING */
#title {
  display: flex;
  align-items: center;
  justify-content: center;
  position: absolute;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  letter-spacing: 7px;

  color: #c00000;
  font-size: 40px;
}

/* TRIANGLE */
.triangle {
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-bottom: 24px solid #c00000;
  margin-left: 10px;
  margin-right: 18px;
}

#bootVer {
  margin-top: 10px;
  font-size: 13px;
}

.field {
  width: 260px;
  border-bottom: 1px solid #ddd;
  padding: 6px;
  margin-top: 14px;
  min-height: 18px;
}

#bootText {
  margin-top: 28px;
  color: #4a90ff;
  opacity: 0;
  animation: pulse 5s ease-in-out infinite;
}

@keyframes pulse {
  0% { opacity: 0; }
  25% { opacity: 0.85; }
  55% { opacity: 0.85; }
  100% { opacity: 0; }
}

/* ---------------- PLAYER ---------------- */

#wrapper {
  height: 100vh;
  display: none;
  justify-content: center;
  align-items: center;
}

/* FIX: stabilize playlist row math */
#playlist {
  height: 180px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
  font-size: 16px;
}

.track {
  padding: 6px;
  height: 34px; /* LOCKED for alignment stability */
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.25s ease;
  cursor: pointer;
}

.track.active {
  color: #c00000;
  font-weight: bold;
  transform: scale(1.25);
}

.track.near { opacity: 0.55; }
.track.far { opacity: 0.2; transform: scale(0.88); }

/* ---------------- FLOATING PLAY (FIXED ALIGNMENT) ---------------- */

#floatingPlay {
  position: fixed;
  left: calc(50% - 260px - 140px);
  top: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
  transition: top 0.08s linear;
}

.playTriangle {
  width: 0;
  height: 0;
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-bottom: 30px solid #c00000;
  transform-origin: center;
}

.playTriangle.spinning {
  animation: spin 5.2s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ---------------- PROGRESS ---------------- */

#progressContainer {
  width: 100%;
  height: 6px;
  background: #eee;
  cursor: pointer;
}

#progressBar {
  width: 0%;
  height: 100%;
  background: #c00000;
}

/* ---------------- VOLUME ---------------- */

#volumeWrap {
  margin-top: 18px;
}

input[type=range] {
  width: 220px;
  accent-color: #c00000;
}

/* ---------------- CORNER LOGO ---------------- */

#cornerLogo {
  position: fixed;
  bottom: 10px;
  left: 12px;
  display: flex;
  align-items: center;
  color: #c00000;
  opacity: 0.75;
  letter-spacing: 4px;
}

.smallTri {
  transform: scale(0.6);
  margin-left: 4px;
  margin-right: 10px;
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.6;
}

</style>
</head>

<body>

<div id="boot">
  <div id="title">
    <span>T</span><span>R</span><span>I</span>
    <div class="triangle"></div>
    <span>G</span><span>E</span>
  </div>

  <div id="bootVer">v0.16.5</div>

  <div class="field" id="userField"></div>
  <div class="field" id="passField"></div>

  <div id="bootText">Wake up -U</div>
</div>

<div id="wrapper">

  <div id="floatingPlay">
    <div class="playTriangle" id="playIcon"></div>
  </div>

  <div id="playlist"></div>

  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <div id="volumeWrap">
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
  </div>

</div>

<div id="cornerLogo">
  T R I <div class="triangle smallTri"></div> G E
</div>

<div id="version">
Last Functional Build: N/A<br>
Current Build: 0.16.5
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

<script>

/* ---------------- TRACKS ---------------- */

const tracks = [
  { title:"Prologue", file:"The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3", volume:0.10 },
  { title:"Announcement 1", file:"Announcement1.oga", volume:0.60 },
  { title:"Control Yourself", file:"Edith Margaret Mudge - Triangle Agency - 01 Control Yourself.flac", volume:0.05 },
  { title:"Stability", file:"Edith Margaret Mudge - Stability - Expansion Pack - 01 Stability - Loopable Extension.mp3", volume:0.05 },
  { title:"Announcement 2", file:"Announcement2.oga", volume:0.60 },
  { title:"Announcement 3", file:"Announcement3.oga", volume:0.60 },
  { title:"Announcement 4", file:"Announcement4.oga", volume:0.60 },
  { title:"Announcement 6", file:"Announcement6.oga", volume:0.60 }
];

let currentTrack = 0;
let sound = null;
let globalVolume = 1;

/* ---------------- ELEMENTS ---------------- */

const playlist = document.getElementById("playlist");
const progressBar = document.getElementById("progressBar");
const progressContainer = document.getElementById("progressContainer");
const volumeSlider = document.getElementById("volumeSlider");
const floatingPlay = document.getElementById("floatingPlay");
const playIcon = document.getElementById("playIcon");

/* ---------------- ALIGN FIX ---------------- */

function updateFloatingAlignment() {
  const base = 34;
  const offset = (2 * base);
  floatingPlay.style.top = `calc(50% - ${offset}px)`;
}

/* ---------------- AUDIO ---------------- */

function playTrack(i) {

  currentTrack = i;

  if (sound) sound.unload();

  sound = new Howl({
    src:[tracks[i].file],
    html5:true,
    volume: tracks[i].volume * globalVolume,

    onplay: () => playIcon.classList.add("spinning"),
    onpause: () => playIcon.classList.remove("spinning"),
    onend: () => {
      if (currentTrack + 1 < tracks.length) playTrack(currentTrack + 1);
    }
  });

  sound.play();
  render();
  updateFloatingAlignment();
}

/* ---------------- PLAYLIST ---------------- */

function render() {

  playlist.innerHTML = "";

  for (let i=0;i<tracks.length;i++) {

    const d = i - currentTrack;
    if (Math.abs(d) > 2) continue;

    const el = document.createElement("div");
    el.className = "track" + (d===0?" active":d===1||d===-1?" near":" far");
    el.innerText = tracks[i].title;
    el.onclick = () => playTrack(i);

    playlist.appendChild(el);
  }

  updateFloatingAlignment();
}

/* ---------------- VOLUME FIX (REAL TIME IOS) ---------------- */

volumeSlider.addEventListener("input",(e)=>{

  globalVolume = parseFloat(e.target.value);

  if (!sound) return;

  const v = tracks[currentTrack].volume * globalVolume;
  sound.volume(v);

  const node = sound._sounds?.[0]?._node;
  if (node) node.volume = v;
});

/* ---------------- PROGRESS ---------------- */

function tick() {
  if (sound) {
    const p = (sound.seek()/sound.duration())*100;
    progressBar.style.width = p + "%";
  }
  requestAnimationFrame(tick);
}
tick();

/* ---------------- TYPE FIX (SLOWED + PAUSES) ---------------- */

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function typeUser(text){
  const el=document.getElementById("userField");
  for(let i=0;i<=text.length;i++){
    el.innerText=text.slice(0,i);
    await sleep(60);
  }
}

async function typePassword(text){
  const el=document.getElementById("passField");
  let masked="";
  for(let i=0;i<text.length;i++){
    el.innerText=masked+text[i];
    await sleep(95);
    masked+="*";
    el.innerText=masked;
    await sleep(60);
  }
}

/* pause between fields */
async function boot(){
  await sleep(300);
  await typeUser("SusanSurandin");
  await sleep(900); // deliberate pause fix
  await typePassword("WitnessMe");
  await sleep(600);

  document.getElementById("boot").style.display="none";
  document.getElementById("wrapper").style.display="flex";

  render();
  playTrack(0);
}

document.getElementById("boot").onclick = boot;

</script>

</body>
</html>
