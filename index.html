<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player v0.07</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: white;
  overflow: hidden;
}

/* ---------------- TRIAGE SCREEN ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* header */
#title {
  font-size: 32px;
  color: red;
  letter-spacing: 4px;
  margin-bottom: 40px;
}

/* fields */
.field {
  width: 260px;
  margin: 10px 0;
  border-bottom: 1px solid #333;
  padding: 6px;
  font-size: 14px;
}

.label {
  color: white;
  opacity: 0.7;
  margin-bottom: 4px;
}

/* boot text */
#bootText {
  margin-top: 40px;
  font-size: 18px;
  opacity: 0;
  transition: opacity 1s ease;
}

/* ---------------- PLAYER ---------------- */

.wrapper {
  max-width: 520px;
  margin: auto;
  padding: 20px;
  margin-top: 60px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  backdrop-filter: blur(20px);
}

#playlist {
  margin-top: 20px;
}

.track {
  text-align: center;
  padding: 6px;
  transition: all 0.25s ease;
  opacity: 0.2;
}

.track.active {
  font-weight: bold;
  opacity: 1;
  transform: scale(1.3);
}

.track.near {
  opacity: 0.5;
  transform: scale(0.95);
}

.track.far {
  opacity: 0.1;
  transform: scale(0.8);
}

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- ---------------- BOOT OVERLAY ---------------- -->
<div id="boot">
  <div id="title">TRIAGE</div>

  <div class="label">Username</div>
  <div class="field" id="userField"></div>

  <div class="label">Password</div>
  <div class="field" id="passField"></div>

  <div id="bootText">INITIALIZING...</div>
</div>

<!-- ---------------- PLAYER ---------------- -->

<div class="wrapper">

<audio id="player" playsinline></audio>
<div id="playlist"></div>

</div>

<div id="version">
Last Functional Build: 0.06<br>
Current Build: 0.07
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

/* ---------------- TRACKS ---------------- */

const tracks = [
  { title: "Intro: Welcome (Back)", file: "Notes5.oga", type: "audio/ogg" },
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3", type: "audio/mp3" },

  { title: "Announcement 1", file: "Announcement1.oga", type: "audio/ogg" },
  { title: "Announcement 2", file: "Announcement2.oga", type: "audio/ogg" },
  { title: "Announcement 3", file: "Announcement3.oga", type: "audio/ogg" },
  { title: "Announcement 4", file: "Announcement4.oga", type: "audio/ogg" },
  { title: "Announcement 6", file: "Announcement6.oga", type: "audio/ogg" }
];

const audio = document.getElementById("player");
const playlistEl = document.getElementById("playlist");

let currentTrack = 0;

/* ---------------- PLYR ---------------- */

const player = new Plyr(audio, {
  controls: ['play', 'progress', 'mute', 'volume']
});

/* ---------------- AUDIO ANALYSER (FIXED) ---------------- */

const ctx = new (window.AudioContext || window.webkitAudioContext)();
let source = ctx.createMediaElementSource(audio);
const analyser = ctx.createAnalyser();

analyser.fftSize = 64;
const data = new Uint8Array(analyser.frequencyBinCount);

source.connect(analyser);
analyser.connect(ctx.destination);

function updateAudioReact() {

  analyser.getByteFrequencyData(data);

  let avg = data.reduce((a,b)=>a+b,0) / data.length;

  const active = document.querySelector(".track.active");

  if (active) {
    active.style.textShadow =
      avg > 120 ? "0 0 18px rgba(255,255,255,0.7)" :
      avg > 60  ? "0 0 10px rgba(255,255,255,0.4)" :
                  "0 0 4px rgba(255,255,255,0.15)";
  }

  requestAnimationFrame(updateAudioReact);
}

/* ---------------- PLAYLIST ---------------- */

function renderPlaylist() {

  playlistEl.innerHTML = "";

  const start = Math.max(0, currentTrack - 2);
  const end = Math.min(tracks.length - 1, currentTrack + 2);

  for (let i = start; i <= end; i++) {

    const el = document.createElement("div");
    el.className = "track";
    el.innerText = tracks[i].title;

    if (i === currentTrack) el.classList.add("active");
    else el.classList.add("near");

    el.onclick = () => playTrack(i);

    playlistEl.appendChild(el);
  }
}

/* ---------------- PLAY TRACK ---------------- */

function playTrack(i) {

  currentTrack = i;

  player.source = {
    type: 'audio',
    sources: [{
      src: tracks[i].file,
      type: tracks[i].type
    }]
  };

  renderPlaylist();

  player.play().catch(()=>{});

}

/* ---------------- AUTO FLOW ---------------- */

player.on("ended", () => {
  if (currentTrack + 1 < tracks.length) {
    playTrack(currentTrack + 1);
  }
});

/* ---------------- BOOT SEQUENCE ---------------- */

function typeText(el, text, speed, cb) {

  let i = 0;

  function step() {
    if (i <= text.length) {
      el.innerText = text.slice(0,i);
      i++;
      setTimeout(step, speed);
    } else if (cb) cb();
  }

  step();
}

function startBoot() {

  const u = document.getElementById("userField");
  const p = document.getElementById("passField");
  const bootText = document.getElementById("bootText");

  typeText(u, "SusanSurandin", 40, () => {

    typeText(p, "WitnessMe", 40, () => {

      let dots = 0;
      bootText.style.opacity = 1;

      const mask = setInterval(() => {
        p.innerText = "*".repeat("WitnessMe".length);

        dots++;
        if (dots > 3) {
          clearInterval(mask);
          bootText.innerText = "WELCOME BACK SUSAN";
        }
      }, 300);

      setTimeout(() => {

        document.getElementById("boot").style.display = "none";

        ctx.resume().then(() => {
          updateAudioReact();
          playTrack(0);
        });

      }, 2000);

    });

  });
}

/* ---------------- INIT ---------------- */

window.addEventListener("click", startBoot, { once: true });

window.addEventListener("load", () => {
  renderPlaylist();
});

</script>

</body>
</html>
