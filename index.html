<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>TRI▲GE v0.15</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>

/* ---------------- BASE ---------------- */

body {
  margin: 0;
  background: white;
  font-family: monospace;
  color: black;
  overflow: hidden;
}

/* ---------------- BOOT CINEMATIC ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 9999;
}

#title {
  font-size: 42px;
  letter-spacing: 6px;
  color: #c00000;
  display: flex;
  align-items: center;
  gap: 8px;
}

.triangle {
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-bottom: 24px solid #c00000;
}

#bootVer {
  margin-top: 10px;
  font-size: 14px;
}

#bootText {
  margin-top: 30px;
  font-size: 16px;
  opacity: 0;
  transition: opacity 0.4s ease;
}

/* login illusion fields (NOT REAL SCREENS) */

#ghost {
  margin-top: 30px;
  width: 260px;
}

.field {
  border-bottom: 1px solid #ddd;
  padding: 6px;
  min-height: 20px;
  margin: 10px 0;
}

/* ---------------- PLAYER ---------------- */

.wrapper {
  max-width: 520px;
  margin: 60px auto;
  padding: 20px;
  background: rgba(255,255,255,0.06);
  border-radius: 14px;
  backdrop-filter: blur(18px);

  display: none; /* revealed after boot */
}

.track {
  padding: 6px;
  cursor: pointer;
  transition: 0.2s ease;
}

.track.active {
  color: #c00000;
  font-weight: bold;
  transform: scale(1.2);
}

.track.near {
  opacity: 0.6;
}

.track.far {
  opacity: 0.2;
  transform: scale(0.9);
}

/* ---------------- FOOT ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.6;
}

</style>
</head>

<body>

<!-- BOOT CINEMATIC -->
<div id="boot">
  <div id="title">
    T R I <div class="triangle"></div> G E
  </div>

  <div id="bootVer">v0.15</div>

  <div id="ghost">
    <div class="field" id="userField"></div>
    <div class="field" id="passField"></div>
  </div>

  <div id="bootText">CLICK TO INITIALIZE</div>
</div>

<!-- PLAYER -->
<div class="wrapper" id="playerWrap">
  <audio id="player" playsinline></audio>
  <div id="playlist"></div>
</div>

<div id="version">
Last Functional Build: N/A<br>
Current Build: 0.15
</div>

<audio id="loginSfx" src="Notes5.oga" preload="auto"></audio>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

/* ---------------- TRACK DATA ---------------- */

const tracks = [
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3", type: "audio/mp3", volume: 0.1 },
  { title: "Announcement 1", file: "Announcement1.oga", type: "audio/ogg", volume: 0.6 },
  { title: "Control Yourself", file: "Edith Margaret Mudge - Triangle Agency - 01 Control Yourself.flac", type: "audio/flac", volume: 0.05 },
  { title: "Stability", file: "Edith Margaret Mudge - Stability - Expansion Pack - 01 Stability - Loopable Extension.mp3", type: "audio/mp3", volume: 0.05 },
  { title: "Announcement 2", file: "Announcement2.oga", type: "audio/ogg", volume: 0.6 },
  { title: "Announcement 3", file: "Announcement3.oga", type: "audio/ogg", volume: 0.6 },
  { title: "Announcement 4", file: "Announcement4.oga", type: "audio/ogg", volume: 0.6 },
  { title: "Announcement 6", file: "Announcement6.oga", type: "audio/ogg", volume: 0.6 }
];

const audio = document.getElementById("player");
const playlistEl = document.getElementById("playlist");
const loginSfx = document.getElementById("loginSfx");
const wrapper = document.getElementById("playerWrap");

let currentTrack = 0;

/* ---------------- PLYR ---------------- */

const player = new Plyr(audio, {
  controls: ['play', 'progress', 'current-time', 'mute', 'volume'],
  volume: 0.5
});

/* ---------------- PLAYLIST ---------------- */

function renderPlaylist() {
  playlistEl.innerHTML = "";

  for (let i = 0; i < tracks.length; i++) {

    const distance = i - currentTrack;
    if (Math.abs(distance) > 2) continue;

    const el = document.createElement("div");
    el.className = "track";
    el.innerText = tracks[i].title;

    if (distance === 0) el.classList.add("active");
    else if (Math.abs(distance) === 1) el.classList.add("near");
    else el.classList.add("far");

    el.onclick = () => playTrack(i);
    playlistEl.appendChild(el);
  }
}

/* ---------------- AUDIO ---------------- */

function playTrack(i) {
  currentTrack = i;

  const v = tracks[i].volume ?? 1;

  audio.volume = v;
  player.volume = v;

  player.source = {
    type: 'audio',
    sources: [{
      src: tracks[i].file,
      type: tracks[i].type
    }]
  };

  renderPlaylist();

  player.once('loadedmetadata', () => {
    player.play().catch(()=>{});
  });
}

/* ---------------- BOOT CINEMATIC ---------------- */

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function type(el, text, speed = 40) {
  el.innerText = "";
  for (let i = 0; i <= text.length; i++) {
    el.innerText = text.slice(0, i);
    await sleep(speed);
  }
}

async function bootSequence() {

  const u = document.getElementById("userField");
  const p = document.getElementById("passField");
  const bootText = document.getElementById("bootText");

  /* iOS unlock */
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const source = ctx.createMediaElementSource(loginSfx);
  const gain = ctx.createGain();
  gain.gain.value = 1.1;
  source.connect(gain);
  gain.connect(ctx.destination);

  loginSfx.play().catch(()=>{});

  /* cinematic sequence */

  bootText.style.opacity = 1;

  await sleep(500);
  await type(u, "SusanSurandin", 45);

  await sleep(200);
  await type(p, "WitnessMe", 55);

  await sleep(400);
  bootText.innerText = "INITIALIZING AUDIO SUBSYSTEM";

  await sleep(900);
  bootText.innerText = "WELCOME BACK SUSAN";

  await sleep(800);

  /* transition */

  document.getElementById("boot").style.opacity = 0;
  document.getElementById("boot").style.transition = "opacity 0.6s ease";

  await sleep(600);

  document.getElementById("boot").style.display = "none";
  wrapper.style.display = "block";

  renderPlaylist();
  playTrack(0);
}

/* ---------------- INIT ---------------- */

window.addEventListener("click", bootSequence, { once: true });

</script>

</body>
</html>
