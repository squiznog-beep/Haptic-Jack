<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Audio Player</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1a1a, #0c0c0c);
  font-family: system-ui, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  padding: 40px 10px;
}

.player-wrapper {
  width: 100%;
  max-width: 480px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

#toggle {
  cursor: pointer;
  font-size: 14px;
  opacity: 0.7;
  margin: 10px 0;
}

#playlist {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

#playlist.open {
  max-height: 200px;
}

.track {
  padding: 6px 0;
  cursor: pointer;
  opacity: 0.7;
}

.track:hover {
  opacity: 1;
}

.track.active {
  opacity: 1;
  font-weight: 600;
}

#status {
  font-size: 12px;
  opacity: 0;
  margin-top: 8px;
  transition: opacity 0.6s ease;
}

#status.show {
  opacity: 0.8;
}

#loopBtn {
  margin-top: 10px;
  cursor: pointer;
  font-size: 13px;
  opacity: 0.6;
}

#loopBtn.active {
  opacity: 1;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="player-wrapper">
  <audio id="player" controls></audio>
  <div id="loopBtn">Loop: Off</div>
  <div id="toggle">Show Playlist</div>
  <div id="playlist"></div>
  <div id="status">Now Resuming...</div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
const tracks = [
  { title: "Welcome (Back)", file: "Notes5.oga" }, // INTRO
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3" }
];

const audio = document.getElementById('player');
const playlist = document.getElementById('playlist');
const toggle = document.getElementById('toggle');
const statusText = document.getElementById('status');
const loopBtn = document.getElementById('loopBtn');

let currentTrack = 0;
let introFinished = false;
let loopEnabled = false;

// Build playlist (skip intro visually)
tracks.forEach((track, index) => {
  if (index === 0) return;

  const div = document.createElement('div');
  div.className = 'track';
  div.innerText = track.title;
  div.onclick = () => loadTrack(index);
  playlist.appendChild(div);
});

function updateActive() {
  document.querySelectorAll('.track').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === currentTrack);
  });
}

//function fadeInIntro() {
//  audio.volume = 0;
//  audio.play();
//  let fade = setInterval(() => {
//    if (audio.volume < 0.30) {
//      audio.volume += 0.03;
//    } else {
//      clearInterval(fade);
//    }
//  }, 200);
//}

function loadTrack(index, resumeTime = 0) {
  currentTrack = index;
  audio.src = tracks[index].file;

  audio.addEventListener('loadedmetadata', function setTime() {
    if (resumeTime > 0) {
      audio.currentTime = resumeTime;
    }
    audio.removeEventListener('loadedmetadata', setTime);
  });

  audio.play();
  updateActive();
}

// Resume logic (within 1 hour)
audio.addEventListener('ended', () => {
  if (!introFinished) {
    introFinished = true;

    const savedTrack = parseInt(localStorage.getItem("lastTrack"));
    const savedTime = parseFloat(localStorage.getItem("lastTime"));
    const lastSession = parseInt(localStorage.getItem("lastSession"));

    const now = Date.now();
    const oneHour = 60 * 60 * 1000;

    if (
      !isNaN(savedTrack) &&
      savedTrack > 0 &&
      lastSession &&
      now - lastSession <= oneHour
    ) {
      statusText.classList.add("show");
      loadTrack(savedTrack, savedTime || 0);

      setTimeout(() => {
        statusText.classList.remove("show");
      }, 3000);
    } else {
      loadTrack(1);
    }
  } else {
    if (!loopEnabled) {
      audio.pause();
    } else {
      audio.currentTime = 0;
      audio.play();
    }
  }
});

// Save progression
audio.addEventListener("timeupdate", () => {
  localStorage.setItem("lastTrack", currentTrack);
  localStorage.setItem("lastTime", audio.currentTime);
  localStorage.setItem("lastSession", Date.now());
});

// Volume memory with 30% default
if (localStorage.getItem("volume")) {
  audio.volume = localStorage.getItem("volume");
} else {
  audio.volume = 0.30;
}

audio.addEventListener("volumechange", () => {
  localStorage.setItem("volume", audio.volume);
});

// Loop toggle
loopBtn.onclick = () => {
  loopEnabled = !loopEnabled;
  loopBtn.innerText = loopEnabled ? "Loop: On" : "Loop: Off";
  loopBtn.classList.toggle("active");
};

// Playlist toggle
toggle.onclick = () => {
  playlist.classList.toggle('open');
  toggle.innerText = playlist.classList.contains('open')
    ? "Hide Playlist"
    : "Show Playlist";
};

const player = new Plyr(audio);

// ALWAYS start with Welcome (Back)
audio.src = tracks[0].file;
fadeInIntro();
</script>

</body>
</html>
