<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player v0.14a</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/amplitudejs@5.3.2/dist/amplitude.min.css"/>

<style>

/* ---------------- THEME (WHITE + RED TEST MODE) ---------------- */

:root {
  --accent: #b30000;
}

body {
  margin: 0;
  background: white;
  font-family: monospace;
  color: black;
  overflow: hidden;
}

/* ---------------- BOOT ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: white;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#bootVer {
  font-size: 12px;
  opacity: 0.6;
  margin-left: 12px;
  position: relative;
  top: 6px;
  color: var(--accent);
}

#title {
  font-size: 32px;
  color: var(--accent);
  letter-spacing: 4px;
  margin-bottom: 40px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.triangle {
  width: 0.9em;
  height: 0.9em;
  background: var(--accent);
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  position: relative;
  top: 2px;
}

.label {
  opacity: 0.7;
  margin-bottom: 4px;
}

.field {
  width: 260px;
  border-bottom: 1px solid #ccc;
  padding: 6px;
  font-size: 14px;
  min-height: 20px;
  margin-bottom: 15px;
}

/* ---------------- PLAYER ---------------- */

.wrapper {
  max-width: 520px;
  margin: auto;
  padding: 20px;
  margin-top: 60px;
  background: rgba(0,0,0,0.03);
  border-radius: 16px;
  backdrop-filter: blur(20px);
}

.track {
  padding: 6px;
  transition: all 0.25s ease;
  cursor: pointer;
}

.track.active {
  font-weight: bold;
  color: var(--accent);
  transform: scale(1.2);
}

.track.near {
  opacity: 0.6;
}

.track.far {
  opacity: 0.2;
}

#logo {
  position: fixed;
  bottom: 10px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--accent);
  opacity: 0.8;
}

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.6;
}

/* hide amplitude default UI */
.amplitude-player {
  display: none;
}

</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  <div id="title">
    T R I <div class="triangle"></div> G E
    <span id="bootVer">0.14a</span>
  </div>

  <div class="label">Username</div>
  <div class="field" id="userField"></div>

  <div class="label">Password</div>
  <div class="field" id="passField"></div>

  <div id="bootText">INITIALIZING...</div>
</div>

<!-- PLAYER -->
<div class="wrapper">
  <div id="playlist"></div>
</div>

<div id="logo">
  T R I <div class="triangle"></div> G E
</div>

<div id="version">
Last Functional Build: 0.12<br>
Current Build: 0.14a
</div>

<audio id="loginSfx" src="Notes5.oga" preload="auto"></audio>

<!-- AMPLITUDE -->
<script src="https://cdn.jsdelivr.net/npm/amplitudejs@5.3.2/dist/amplitude.min.js"></script>

<script>

/* ---------------- TRACKS ---------------- */

const tracks = [
  { name: "Prologue", url: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3", volume: 0.1 },
  { name: "Announcement 1", url: "Announcement1.oga", volume: 0.6 },
  { name: "Control Yourself", url: "Edith Margaret Mudge - Triangle Agency - 01 Control Yourself.flac", volume: 0.05 },
  { name: "Stability", url: "Edith Margaret Mudge - Stability - Expansion Pack - 01 Stability - Loopable Extension.mp3", volume: 0.05 },
  { name: "Announcement 2", url: "Announcement2.oga", volume: 0.6 },
  { name: "Announcement 3", url: "Announcement3.oga", volume: 0.6 },
  { name: "Announcement 4", url: "Announcement4.oga", volume: 0.6 },
  { name: "Announcement 6", url: "Announcement6.oga", volume: 0.6 }
];

/* ---------------- AMPLITUDE INIT ---------------- */

Amplitude.init({
  songs: tracks,
  volume: 0.5
});

/* ---------------- PLAYLIST ---------------- */

const playlistEl = document.getElementById("playlist");

function renderPlaylist() {
  playlistEl.innerHTML = "";

  tracks.forEach((t, i) => {
    const el = document.createElement("div");
    el.className = "track";
    el.innerText = t.name;

    el.onclick = () => {
      Amplitude.playSongAtIndex(i);
    };

    playlistEl.appendChild(el);
  });
}

/* highlight active track */
setInterval(() => {
  const index = Amplitude.getActiveIndex();

  document.querySelectorAll(".track").forEach((el, i) => {
    el.classList.remove("active");

    if (i === index) {
      el.classList.add("active");
    }
  });
}, 200);

/* ---------------- BOOT (UNCHANGED LOGIC) ---------------- */

async function typePassword(el, text) {
  let masked = "";

  for (let i = 0; i < text.length; i++) {
    el.innerText = masked + text[i];
    await new Promise(r => setTimeout(r, 100));
    masked += "*";
    el.innerText = masked;
  }
}

function typeUser(el, text, cb) {
  let i = 0;

  function step() {
    if (i <= text.length) {
      el.innerText = text.slice(0, i);
      i++;
      setTimeout(step, 40);
    } else cb();
  }

  step();
}

function startBoot() {

  const u = document.getElementById("userField");
  const p = document.getElementById("passField");
  const bootText = document.getElementById("bootText");

  setTimeout(() => {
    document.getElementById("loginSfx").play().catch(()=>{});
  }, 1600);

  typeUser(u, "SusanSurandin", () => {

    typePassword(p, "WitnessMe").then(() => {

      bootText.style.opacity = 1;
      bootText.innerText = "WELCOME BACK SUSAN";

      setTimeout(() => {
        document.getElementById("boot").style.display = "none";
        renderPlaylist();
      }, 1500);

    });

  });
}

window.addEventListener("click", startBoot, { once: true });

</script>

</body>
</html>
