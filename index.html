<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player v0.03</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  padding: 40px;
  background: radial-gradient(circle at top, #1a1a1a, #0c0c0c);
  font-family: system-ui, sans-serif;
  color: white;
}

.wrapper {
  max-width: 520px;
  margin: auto;
  padding: 20px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
}

/* ---------------- PLAYLIST ---------------- */

#playlist {
  margin-top: 20px;
}

.track {
  cursor: pointer;
  text-align: center;
  opacity: 0.25;
  transform: scale(0.85);
  transition: all 0.35s ease;
  padding: 6px 0;
}

.track.near {
  opacity: 0.6;
  transform: scale(1);
}

.track.active {
  opacity: 1;
  transform: scale(1.25);
  font-weight: 700;
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.5;
  text-align: right;
}
</style>
</head>

<body>

<div class="wrapper">

<audio id="player" playsinline></audio>

<div id="playlist"></div>

</div>

<div id="version">
Last Functional Build: 0.02<br>
Current Build: 0.03
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

/* ---------------- TRACK LIST ---------------- */

const tracks = [
  { title: "Intro: Welcome (Back)", file: "Notes5.oga", type: "audio/ogg" },
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3", type: "audio/mp3" },

  { title: "Announcement 1", file: "Announcement1.oga", type: "audio/ogg" },
  { title: "Announcement 2", file: "Announcement2.oga", type: "audio/ogg" },
  { title: "Announcement 3", file: "Announcement3.oga", type: "audio/ogg" },
  { title: "Announcement 4", file: "Announcement4.oga", type: "audio/ogg" },
  { title: "Announcement 6", file: "Announcement6.oga", type: "audio/ogg" }
];

const audio = document.getElementById("player");
const playlistEl = document.getElementById("playlist");

let currentTrack = 0;

/* ---------------- PLYR CORE ---------------- */

const player = new Plyr(audio, {
  controls: [
    'play',
    'progress',
    'current-time',
    'mute',
    'volume'
  ]
});

/* ---------------- PLAYLIST RENDER ---------------- */

function renderPlaylist() {
  playlistEl.innerHTML = "";

  tracks.forEach((t, i) => {

    const el = document.createElement("div");
    el.className = "track";
    el.innerText = t.title;

    const distance = Math.abs(i - currentTrack);

    if (i === currentTrack) {
      el.classList.add("active");
    } else if (distance <= 2) {
      el.classList.add("near");
    } else {
      el.style.display = "none";
    }

    el.onclick = () => playTrack(i);

    playlistEl.appendChild(el);
  });
}

/* ---------------- PLAY TRACK ---------------- */

function playTrack(i) {

  currentTrack = i;

  player.source = {
    type: 'audio',
    sources: [{
      src: tracks[i].file,
      type: tracks[i].type
    }]
  };

  renderPlaylist();

  const attempt = player.play();

  if (attempt !== undefined) {
    attempt.catch(() => {
      console.log("Autoplay blocked or requires interaction");
    });
  }
}

/* ---------------- AUTO NEXT ---------------- */

player.on("ended", () => {
  if (currentTrack + 1 < tracks.length) {
    playTrack(currentTrack + 1);
  }
});

/* ---------------- INIT ---------------- */

window.addEventListener("load", () => {
  renderPlaylist();
  playTrack(0);
});

</script>

</body>
</html>
