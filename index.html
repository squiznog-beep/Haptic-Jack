<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Audio Player</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1a1a, #0c0c0c);
  font-family: system-ui, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  padding: 40px 10px;
}

.player-wrapper {
  width: 100%;
  max-width: 520px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

#playlist {
  margin-top: 10px;
}

.track {
  padding: 6px 0;
  cursor: pointer;
  opacity: 0.7;
}

.track:hover { opacity: 1; }

.track.active {
  opacity: 1;
  font-weight: 600;
}

#status {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="player-wrapper">

  <!-- MUST HAVE CONTROLS OR SOME BROWSERS COLLAPSE UI -->
  <audio id="player" controls></audio>

  <div id="status">Loading player...</div>

  <div id="playlist"></div>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

document.addEventListener("DOMContentLoaded", () => {

  /* ---------------- TRACKS ---------------- */

  const tracks = [
    { title: "Welcome (Back)", file: "Notes5.oga" },
    { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3" }
  ];

  /* ---------------- ELEMENTS ---------------- */

  const audio = document.getElementById("player");
  const status = document.getElementById("status");
  const playlist = document.getElementById("playlist");

  /* ---------------- INIT PLYR (CRITICAL ORDER FIX) ---------------- */

  const player = new Plyr(audio);

  let currentTrack = 0;
  let introDone = false;

  /* ---------------- PLAYLIST UI ---------------- */

  tracks.forEach((t, i) => {
    if (i === 0) return;

    const div = document.createElement("div");
    div.className = "track";
    div.innerText = t.title;
    div.onclick = () => loadTrack(i);
    playlist.appendChild(div);
  });

  function updateActive() {
    document.querySelectorAll(".track").forEach((el, i) => {
      el.classList.toggle("active", i + 1 === currentTrack);
    });
  }

  /* ---------------- LOAD TRACK ---------------- */

  function loadTrack(index, resumeTime = 0) {
    currentTrack = index;
    audio.src = tracks[index].file;

    audio.addEventListener("loadedmetadata", function setTime() {
      if (resumeTime > 0) audio.currentTime = resumeTime;
      audio.removeEventListener("loadedmetadata", setTime);
    });

    audio.play().catch(() => {});
    updateActive();
  }

  /* ---------------- INTRO START (FIXED RELIABLE TRIGGER) ---------------- */

  audio.src = tracks[0].file;

  audio.addEventListener("canplay", function startIntro() {
    audio.removeEventListener("canplay", startIntro);

    player.volume = 0.70;

    audio.play()
      .then(() => {
        status.innerText = "Playing intro...";
      })
      .catch(() => {
        status.innerText = "Click play to start audio";
      });
  });

  /* ---------------- END LOGIC ---------------- */

  audio.addEventListener("ended", () => {

    if (!introDone && currentTrack === 0) {
      introDone = true;

      player.volume = 0.10;

      const savedTrack = parseInt(localStorage.getItem("lastTrack"));
      const savedTime = parseFloat(localStorage.getItem("lastTime"));
      const lastSession = parseInt(localStorage.getItem("lastSession"));

      const now = Date.now();
      const oneHour = 60 * 60 * 1000;

      let shouldResume =
        !isNaN(savedTrack) &&
        savedTrack > 0 &&
        lastSession &&
        now - lastSession <= oneHour;

      if (shouldResume) {
        status.innerText = "Now Resuming...";
        loadTrack(savedTrack, savedTime || 0);
      } else {
        loadTrack(1);
      }

      return;
    }

    let next = currentTrack + 1;

    if (next >= tracks.length) {
      audio.pause();
    } else {
      loadTrack(next);
    }
  });

  /* ---------------- SAVE PROGRESS ---------------- */

  audio.addEventListener("timeupdate", () => {
    localStorage.setItem("lastTrack", currentTrack);
    localStorage.setItem("lastTime", audio.currentTime);
    localStorage.setItem("lastSession", Date.now());
  });

});

</script>

</body>
</html>
