<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>MediaElement Volume Test</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mediaelement@4.2.17/build/mediaelementplayer.min.css">

<style>
body {
  font-family: monospace;
  background: white;
  color: black;
  padding: 40px;
}

.wrapper {
  max-width: 500px;
}

label {
  display: block;
  margin-top: 20px;
}

input[type="range"] {
  width: 300px;
}
</style>
</head>

<body>

<div class="wrapper">

  <h2>Prologue Volume Test</h2>

  <audio id="player" controls preload="auto">
    <source src="The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3" type="audio/mp3">
  </audio>

  <label>
    Volume
    <input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
  </label>

</div>

<script src="https://cdn.jsdelivr.net/npm/mediaelement@4.2.17/build/mediaelement-and-player.min.js"></script>

<script>
const audio = document.getElementById("player");

// initialize MediaElement.js
const player = new MediaElementPlayer(audio, {
  features: ['playpause', 'progress', 'volume']
});

// direct volume control test
const slider = document.getElementById("volume");

slider.addEventListener("input", () => {
  const v = parseFloat(slider.value);

  // IMPORTANT: set BOTH
  player.setVolume(v);
  audio.volume = v;
});
</script>

</body>
</html>
