<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Amplitude Audio Lab v0.14f</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/amplitudejs@5.3.2/dist/amplitude.min.css"/>

<style>

body {
  margin: 0;
  font-family: monospace;
  background: white;
  color: black;
}

.wrapper {
  max-width: 600px;
  margin: 60px auto;
  padding: 20px;
}

.track {
  padding: 10px;
  cursor: pointer;
  border-bottom: 1px solid #ddd;
}

.track.active {
  color: #b30000;
  font-weight: bold;
}

.controls {
  margin-bottom: 20px;
  padding: 10px;
  border: 1px solid #ccc;
}

label {
  display: block;
  margin-bottom: 6px;
}

</style>
</head>

<body>

<div class="wrapper">

  <div class="controls">
    <label>Global Volume (Amplitude)</label>
    <input type="range" min="0" max="100" value="50"
      oninput="Amplitude.setVolume(this.value / 100)">
  </div>

  <div id="playlist"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/amplitudejs@5.3.2/dist/amplitude.min.js"></script>

<script>

/* ---------------- TRACKS ---------------- */

const tracks = [
  { name: "Prologue", url: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3" },
  { name: "Announcement 1", url: "Announcement1.oga" },
  { name: "Control Yourself", url: "Edith Margaret Mudge - Triangle Agency - 01 Control Yourself.flac" },
  { name: "Stability", url: "Edith Margaret Mudge - Stability - Expansion Pack - 01 Stability - Loopable Extension.mp3" },
  { name: "Announcement 2", url: "Announcement2.oga" },
  { name: "Announcement 3", url: "Announcement3.oga" },
  { name: "Announcement 4", url: "Announcement4.oga" },
  { name: "Announcement 6", url: "Announcement6.oga" }
];

/* ---------------- INIT ---------------- */

Amplitude.init({
  songs: tracks,
  volume: 0.5
});

/* ---------------- PLAYLIST UI ---------------- */

const el = document.getElementById("playlist");

function render() {

  el.innerHTML = "";

  tracks.forEach((t, i) => {

    const div = document.createElement("div");
    div.className = "track";
    div.innerText = t.name;

    div.onclick = () => {
      Amplitude.playSongAtIndex(i);
    };

    el.appendChild(div);
  });
}

render();

/* ---------------- ACTIVE TRACK HIGHLIGHT ---------------- */

setInterval(() => {

  const idx = Amplitude.getActiveIndex();

  document.querySelectorAll(".track").forEach((t, i) => {
    t.classList.toggle("active", i === idx);
  });

}, 150);

</script>

</body>
</html>
