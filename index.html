<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player v0.06</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  padding: 40px;
  background: radial-gradient(circle at top, #1a1a1a, #0c0c0c);
  font-family: system-ui, sans-serif;
  color: white;
}

/* ---------------- WRAPPER ---------------- */

.wrapper {
  max-width: 520px;
  margin: auto;
  padding: 20px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
}

/* ---------------- PLAYLIST ---------------- */

#playlist {
  margin-top: 20px;
}

.track {
  cursor: pointer;
  text-align: center;
  transition: all 0.25s ease;
  padding: 6px 0;
  opacity: 0.2;
  transform: scale(0.75);
}

/* distance states */
.track.near { opacity: 0.5; transform: scale(0.9); }
.track.adjacent { opacity: 0.8; transform: scale(1.05); }

/* ACTIVE BASE */
.track.active {
  opacity: 1;
  transform: scale(1.35);
  font-weight: 700;
  transition: transform 0.1s ease, opacity 0.1s ease;
}

/* AUDIO REACTIVE GLOW */
.track.glow {
  text-shadow: 0 0 6px rgba(255,255,255,0.25);
}

/* ---------------- GLOW INTENSITY ---------------- */

.track.glow.low {
  text-shadow: 0 0 4px rgba(255,255,255,0.15);
}

.track.glow.mid {
  text-shadow: 0 0 10px rgba(255,255,255,0.35);
}

.track.glow.high {
  text-shadow: 0 0 18px rgba(255,255,255,0.55);
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.5;
  text-align: right;
}

/* ---------------- START OVERLAY ---------------- */

#startLayer {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.65);
  font-size: 18px;
  cursor: pointer;
  z-index: 999;
}
</style>
</head>

<body>

<div id="startLayer">Click / Tap to Enter</div>

<div class="wrapper">

<audio id="player" playsinline></audio>

<div id="playlist"></div>

</div>

<div id="version">
Last Functional Build: 0.05<br>
Current Build: 0.06
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

/* ---------------- TRACKS ---------------- */

const tracks = [
  { title: "Intro: Welcome (Back)", file: "Notes5.oga", type: "audio/ogg" },
  { title: "Prologue", file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3", type: "audio/mp3" },

  { title: "Announcement 1", file: "Announcement1.oga", type: "audio/ogg" },
  { title: "Announcement 2", file: "Announcement2.oga", type: "audio/ogg" },
  { title: "Announcement 3", file: "Announcement3.oga", type: "audio/ogg" },
  { title: "Announcement 4", file: "Announcement4.oga", type: "audio/ogg" },
  { title: "Announcement 6", file: "Announcement6.oga", type: "audio/ogg" }
];

const audio = document.getElementById("player");
const playlistEl = document.getElementById("playlist");
const startLayer = document.getElementById("startLayer");

let currentTrack = 0;

/* ---------------- AUDIO PRELOAD SYSTEM ---------------- */

const preload = tracks.map(t => {
  const a = new Audio();
  a.src = t.file;
  a.preload = "auto";
  return a;
});

/* ---------------- PLYR ---------------- */

const player = new Plyr(audio, {
  controls: ['play', 'progress', 'current-time', 'mute', 'volume']
});

/* ---------------- GESTURE START ---------------- */

function startSystem(){
  startLayer.style.display = "none";
  playTrack(0);
}

/* ---------------- PLAYLIST WINDOW ---------------- */

function renderPlaylist() {

  playlistEl.innerHTML = "";

  const start = Math.max(0, currentTrack - 2);
  const end = Math.min(tracks.length - 1, currentTrack + 2);

  for (let i = start; i <= end; i++) {

    const el = document.createElement("div");
    el.className = "track";
    el.innerText = tracks[i].title;

    const d = Math.abs(i - currentTrack);

    if (i === currentTrack) el.classList.add("active");
    else if (d === 1) el.classList.add("adjacent");
    else el.classList.add("near");

    el.onclick = () => playTrack(i);

    playlistEl.appendChild(el);
  }
}

/* ---------------- AUDIO REACTIVE VISUALS ---------------- */

const ctx = new (window.AudioContext || window.webkitAudioContext)();
const source = ctx.createMediaElementSource(audio);
const analyser = ctx.createAnalyser();

source.connect(analyser);
analyser.connect(ctx.destination);

analyser.fftSize = 64;
const dataArray = new Uint8Array(analyser.frequencyBinCount);

function updateGlow() {

  analyser.getByteFrequencyData(dataArray);

  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];

  const avg = sum / dataArray.length;

  const active = document.querySelector(".track.active");
  if (!active) return;

  active.classList.remove("low", "mid", "high");

  if (avg < 40) active.classList.add("low");
  else if (avg < 90) active.classList.add("mid");
  else active.classList.add("high");

  requestAnimationFrame(updateGlow);
}

/* ---------------- PLAY TRACK ---------------- */

function playTrack(i) {

  currentTrack = i;

  player.source = {
    type: 'audio',
    sources: [{
      src: tracks[i].file,
      type: tracks[i].type
    }]
  };

  renderPlaylist();

  const attempt = player.play();
  if (attempt) attempt.catch(() => {});

}

/* ---------------- AUTO FLOW ---------------- */

player.on("ended", () => {
  if (currentTrack + 1 < tracks.length) {
    playTrack(currentTrack + 1);
  }
});

/* ---------------- INIT ---------------- */

startLayer.addEventListener("click", async () => {

  await ctx.resume();
  startSystem();
  updateGlow();

});

window.addEventListener("load", () => {
  renderPlaylist();
});

</script>

</body>
</html>
