<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Haptic Player v0.07g</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: white;
  overflow: hidden;
}

/* ---------------- MODE SWITCH ---------------- */
body.login #logo,
body.login #title {
  letter-spacing: 7px; /* MORE spacing on login */
}

body.player #logo,
body.player #title {
  letter-spacing: 5px; /* LESS spacing on player */
}

/* ---------------- BOOT ---------------- */

#boot {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* TITLE */
#title {
  color: red;
  font-size: 32px;
  margin-bottom: 30px;
  display: flex;
  align-items: center;
}

/* TRIANGLE FIXED ALIGNMENT */
.triangle {
  width: 0.9em;
  height: 0.9em;
  background: red;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  display: inline-block;

  /* FIX HEIGHT ALIGNMENT */
  transform: translateY(-0.08em);
  margin: 0 6px;
}

/* PLAYER LOGO */
#logo {
  position: fixed;
  bottom: 10px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  opacity: 0.7;
}

/* ---------------- VERSION ---------------- */

#version {
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  opacity: 0.5;
}
</style>
</head>

<body class="login">

<!-- BOOT -->
<div id="boot">
  <div id="title">
    T R I <span class="triangle"></span> G E
  </div>

  <div class="label">Username</div>
  <div class="field" id="userField"></div>

  <div class="label">Password</div>
  <div class="field" id="passField"></div>

  <div id="bootText"></div>
</div>

<!-- PLAYER -->
<div class="wrapper">
  <audio id="player" playsinline></audio>
  <div id="playlist"></div>
</div>

<!-- LOGO -->
<div id="logo">
  T R I <span class="triangle"></span> G E
</div>

<div id="version">
Last Functional Build: 0.07b<br>
Current Build: 0.07g
</div>

<script>

const tracks = [
  { title: "Intro: Welcome (Back)", file: "Notes5.oga", type: "audio/ogg" },

  // FIXED: RAW filename (NOT encoded URL)
  {
    title: "Prologue",
    file: "The Wolf Among Us - Prologue Song 10 Minutes (Seamless Loop).mp3",
    type: "audio/mp3"
  },

  { title: "Announcement 1", file: "Announcement1.oga", type: "audio/ogg" },
  { title: "Announcement 2", file: "Announcement2.oga", type: "audio/ogg" },
  { title: "Announcement 3", file: "Announcement3.oga", type: "audio/ogg" },
  { title: "Announcement 4", file: "Announcement4.oga", type: "audio/ogg" },
  { title: "Announcement 6", file: "Announcement6.oga", type: "audio/ogg" }
];

const audio = document.getElementById("player");

let currentTrack = 0;

/* ---------------- PLAY TRACK ---------------- */

function playTrack(i) {
  currentTrack = i;

  audio.pause();
  audio.src = tracks[i].file;
  audio.load();
  audio.play().catch(()=>{});

  renderPlaylist();
}

/* ---------------- PLAYLIST ---------------- */

const playlistEl = document.getElementById("playlist");

function renderPlaylist() {
  playlistEl.innerHTML = "";

  const start = Math.max(0, currentTrack - 2);
  const end = Math.min(tracks.length - 1, currentTrack + 2);

  for (let i = start; i <= end; i++) {
    const el = document.createElement("div");
    el.innerText = tracks[i].title;

    if (i === currentTrack) el.style.fontWeight = "bold";

    el.onclick = () => playTrack(i);

    playlistEl.appendChild(el);
  }
}

/* ---------------- BOOT ---------------- */

function boot() {

  const start = performance.now();

  document.body.classList.remove("login");
  document.body.classList.add("player");

  const delay = Math.max(0, 1500 - (performance.now() - start));

  setTimeout(() => {
    playTrack(0);
  }, delay);

  setTimeout(() => {
    document.getElementById("boot").style.display = "none";
  }, delay + 1000);
}

window.addEventListener("click", boot, { once: true });

window.addEventListener("load", renderPlaylist);

</script>

</body>
</html>
